  document.querySelectorAll('.kw:not([data-g])').forEach(el=>{
    const key=glossLower[el.textContent.trim().toLowerCase()];
    if(key) el.dataset.g=key;
  });
  // build quizzes
  Object.keys(QUIZ).forEach(ch=>{
    const host=document.getElementById('quiz-'+ch);
    if(host) host.innerHTML=renderQuiz(ch);
  });
  attachGloss();
  attachTabs();
}

function renderQuiz(ch){
  let h=`<h2>Quick check — test yourself</h2>`;
  QUIZ[ch].forEach((item,i)=>{
    h+=`<div class="quiz-q" data-ch="${ch}" data-i="${i}">
      <div class="qn">Q${i+1}</div><div class="qt">${item.q}</div>`;
    item.o.forEach((opt,j)=>{
      h+=`<div class="opt" onclick="answer('${ch}',${i},${j},this)">${opt}</div>`;
    });
    h+=`<div class="explain">${item.e}</div></div>`;
  });
  return h;
}

const answeredSet=new Set();
function answer(ch,i,j,el){
  const item=QUIZ[ch][i];
  const box=el.parentElement;
  if(box.dataset.locked) return;
  box.dataset.locked='1';
  const opts=box.querySelectorAll('.opt');
  opts.forEach((o,k)=>{
    if(k===item.a)o.classList.add('correct');
    if(k===j&&j!==item.a)o.classList.add('wrong');
    o.style.cursor='default';
  });
  box.querySelector('.explain').classList.add('show');
  const key=ch+'-'+i;
  if(!answeredSet.has(key)){answeredSet.add(key);answeredCount++;updateProgress();}
}
function updateProgress(){
  const pct=Math.round(answeredCount/totalQuestions*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('ptxt').textContent=answeredCount+' / '+totalQuestions+' answered';
}

// glossary tooltips — works for .term and any [data-g] keyword
function attachGloss(){
  const tip=document.getElementById('tip');
  function showTip(el,e){
    const key=el.dataset.g; const g=GLOSS[key]; if(!g)return;
    tip.innerHTML='<b>'+key+'</b> — '+g; tip.style.display='block'; moveTip(e);
  }
  document.querySelectorAll('[data-g]').forEach(t=>{
    t.addEventListener('mouseenter',e=>showTip(t,e));
    t.addEventListener('mousemove',moveTip);
    t.addEventListener('mouseleave',()=>tip.style.display='none');
    // tap-to-toggle on touch devices
    t.addEventListener('click',e=>{
      if(tip.style.display==='block'&&tip.dataset.for===t.dataset.g){tip.style.display='none';tip.dataset.for='';}
      else{showTip(t,e);tip.dataset.for=t.dataset.g;}
    });
  });
  function moveTip(e){
    let x=(e.clientX||0)+14,y=(e.clientY||0)+14;
    if(x+280>window.innerWidth)x=Math.max(8,(e.clientX||0)-290);
    if(y+120>window.innerHeight)y=Math.max(8,(e.clientY||0)-120);
    tip.style.left=x+'px';tip.style.top=y+'px';
  }
  // dismiss on outside click
  document.addEventListener('click',e=>{if(!e.target.closest('[data-g]'))tip.style.display='none';},true);
}

// Attach glossary tooltips to [data-g] terms inside a freshly-rendered container.
// Used by dynamic content (e.g. the animated SNMP captions).
window.attachGlossWithin=function(root){
  if(!root) return;
  const tip=document.getElementById('tip');
  if(!tip) return;
  function moveTip(e){
    let x=(e.clientX||0)+14,y=(e.clientY||0)+14;
    if(x+280>window.innerWidth)x=Math.max(8,(e.clientX||0)-290);
    if(y+120>window.innerHeight)y=Math.max(8,(e.clientY||0)-120);
    tip.style.left=x+'px';tip.style.top=y+'px';
  }
  function showTip(el,e){const key=el.dataset.g;const g=GLOSS[key];if(!g)return;tip.innerHTML='<b>'+key+'</b> — '+g;tip.style.display='block';moveTip(e);}
  root.querySelectorAll('[data-g]').forEach(t=>{
    if(t.dataset.glossBound) return; t.dataset.glossBound='1';
    t.addEventListener('mouseenter',e=>showTip(t,e));
    t.addEventListener('mousemove',moveTip);
    t.addEventListener('mouseleave',()=>tip.style.display='none');
    t.addEventListener('click',e=>{showTip(t,e);});
  });
};

// Network: A-B(2), B-C(3), C-D(1), A-C(7) ; line + shortcut
let dvState=null;
function initDV(){
  const edges={ 'A-B':2,'B-A':2,'B-C':3,'C-B':3,'C-D':1,'D-C':1,'A-C':7,'C-A':7 };
  const nodes=['A','B','C','D'];
  const neigh={A:['B','C'],B:['A','C'],C:['B','D','A'],D:['C']};
  function freshTables(){
    const t={};
    nodes.forEach(n=>{t[n]={}; nodes.forEach(m=>{t[n][m]= n===m?0:(edges[n+'-'+m]??Infinity);});});
    return t;
  }
  dvState={round:0,tables:freshTables(),edges,nodes,neigh};
  drawDVGraph();renderDVTables();
  document.getElementById('dv-step').onclick=dvStep;
  document.getElementById('dv-reset').onclick=()=>{dvState.round=0;dvState.tables=freshTables();document.getElementById('dv-round').textContent=0;document.getElementById('dv-state').textContent='Only direct links known';renderDVTables();drawDVGraph();};
}
function dvStep(){
  const {tables,nodes,neigh}=dvState;
  const next=JSON.parse(JSON.stringify(tables),(k,v)=>v===null?Infinity:v);
  // because Infinity doesn't survive JSON; rebuild manually
  const nt={};
  nodes.forEach(n=>{nt[n]={};nodes.forEach(m=>{nt[n][m]=tables[n][m];});});
  let changed=false;
  nodes.forEach(x=>{
    neigh[x].forEach(v=>{
      nodes.forEach(y=>{
        const via=(dvState.edges[x+'-'+v]??Infinity)+tables[v][y];
        if(via<nt[x][y]){nt[x][y]=via;changed=true;}
      });
    });
  });
  dvState.tables=nt;dvState.round++;
  document.getElementById('dv-round').textContent=dvState.round;
  document.getElementById('dv-state').textContent= changed?'Vectors exchanged — routes improving':'Converged ✓ (no more changes)';
  document.getElementById('dv-state').style.color= changed?'var(--yellow)':'var(--accent2)';
  renderDVTables();
}
function drawDVGraph(){
  const pos={A:[60,40],B:[230,40],C:[230,150],D:[60,150]};
  const e=dvState.edges;
  const line=(a,b,w)=>`<line x1="${pos[a][0]}" y1="${pos[a][1]}" x2="${pos[b][0]}" y2="${pos[b][1]}" stroke="#3a4a5e" stroke-width="2"/><text x="${(pos[a][0]+pos[b][0])/2}" y="${(pos[a][1]+pos[b][1])/2-6}" fill="#ffd23f" font-size="12">${w}</text>`;
  let svg=`<svg viewBox="0 0 300 200" style="max-width:320px">`;
  svg+=line('A','B',2)+line('B','C',3)+line('C','D',1)+line('A','C',7);
  Object.keys(pos).forEach(n=>{
    svg+=`<circle cx="${pos[n][0]}" cy="${pos[n][1]}" r="16" fill="#1a2433" stroke="#ff7a1a" stroke-width="2"/><text x="${pos[n][0]}" y="${pos[n][1]+5}" text-anchor="middle" font-size="14" font-weight="700">${n}</text>`;
  });
  svg+=`</svg>`;
  document.getElementById('dv-graph').innerHTML=svg;
}
function renderDVTables(){
  const {tables,nodes}=dvState;
  let h='<div class="grid2" style="margin-top:8px">';
  nodes.forEach(n=>{
    h+=`<div class="card" style="padding:10px"><div style="font-size:12px;color:var(--accent)">Router ${n}'s distance vector</div><table style="margin:6px 0 0"><tr><th>to</th>`;
    nodes.forEach(m=>h+=`<th>${m}</th>`);h+='</tr><tr><td>cost</td>';
    nodes.forEach(m=>{const v=tables[n][m];h+=`<td style="color:${v===Infinity?'#ff5d5d':'var(--accent2)'}">${v===Infinity?'∞':v}</td>`;});
    h+='</tr></table></div>';
  });
  h+='</div>';
  document.getElementById('dv-tables').innerHTML=h;
}

const LEX_OBJECTS=[

];
function initLex(){
  const list=document.getElementById('lex-list');
  const msg=document.getElementById('lex-msg');
  let cur=-1; // -1 = before first
  function render(){
    let h='<div style="font-family:var(--mono);font-size:12.5px">';
    LEX_OBJECTS.forEach((o,i)=>{
      const on=i===cur;
      const visited=i<cur;
      const bg=on?'rgba(255,210,63,.16)':(visited?'rgba(51,214,166,.06)':'transparent');
      const bd=on?'#ffd23f':(visited?'rgba(51,214,166,.3)':'var(--line)');
      const tag=o.kind==='table'?'<span style="font-size:9px;color:var(--violet);border:1px solid var(--violet);border-radius:4px;padding:0 4px;margin-left:6px">table row</span>':'';
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;margin:3px 0;border:1px solid ${bd};border-radius:7px;background:${bg};transition:.2s">
        <span style="min-width:18px;color:${on?'#ffd23f':'var(--muted)'}">${on?'▶':(visited?'✓':'&nbsp;')}</span>
        <code style="color:${on?'#ffd23f':'var(--blue)'}">${o.oid}</code>
        <span style="color:var(--muted)">${o.name}${tag}</span>
        <span style="margin-left:auto;color:${on?'var(--accent2)':'var(--muted)'}">${on||visited?'= '+o.val:''}</span>
      </div>`;
    });
    h+='</div>';
    list.innerHTML=h;
  }
  function next(){
    if(cur>=LEX_OBJECTS.length-1){
      msg.innerHTML='<span style="color:var(--accent2)">End of the udp subtree — the walk is complete. Every object, including all 4 table cells, was visited in order.</span>';
      return;
    }
    cur++;
    const o=LEX_OBJECTS[cur];
    if(cur===0) msg.innerHTML='GetNext → first object: <code>'+o.oid+'</code> ('+o.name+').';
    else{
      const prev=LEX_OBJECTS[cur-1];
      msg.innerHTML='GetNext after <code>'+prev.oid+'</code> → <code>'+o.oid+'</code>. It&rsquo;s next in lexicographic order.';
    }
    render();
  }
  document.getElementById('lex-next').onclick=next;
  document.getElementById('lex-reset').onclick=()=>{cur=-1;msg.textContent='Manager starts at the top of the udp group.';render();};
  render();
}

// ---- CH9: Parity & checksum ----
function initParity(){
  let data=[1,0,1,1,0,0,1,0];
  let rx=[...data];
  const bitsEl=document.getElementById('parity-bits');
  const rxEl=document.getElementById('rx-bits');
  function bitHTML(arr,editable,prefix){
    return arr.map((b,i)=>`<span class="pbit" data-pre="${prefix}" data-i="${i}" style="display:inline-block;width:26px;text-align:center;cursor:pointer;border:1px solid var(--line);border-radius:5px;margin:2px;padding:3px 0;background:${b?'rgba(255,122,26,.15)':'var(--panel2)'};color:${b?'var(--accent)':'var(--muted)'}">${b}</span>`).join('');
  }
  function compute(){
    const ones=data.reduce((a,b)=>a+b,0);
    const parity=ones%2;
    document.getElementById('parity-bit').textContent=parity;
    // checksum: treat as one 8-bit number, complement low byte (toy)
    const val=parseInt(data.join(''),2);
    const cks=((~val)&0xFF).toString(16).padStart(2,'0').toUpperCase();
    document.getElementById('checksum-val').textContent=cks;
    return parity;
  }
  function verdict(){
    const parity=compute();
    const rxOnes=rx.reduce((a,b)=>a+b,0);
    const rxParity=rxOnes%2;
    const flips=rx.filter((b,i)=>b!==data[i]).length;
    const detected=(rxParity!==parity);
    let msg;
    if(flips===0) msg='<b style="color:var(--accent2)">No errors.</b> Received word matches sent word.';
    else if(detected) msg=`<b style="color:var(--accent2)">✓ Error DETECTED!</b> ${flips} bit(s) flipped → parity mismatch caught it.`;
    else msg=`<b style="color:var(--bad)">✗ Error MISSED!</b> ${flips} bits flipped (even number) → parity slips through. This is why CRC is stronger.`;
    document.getElementById('parity-verdict').innerHTML=msg;
  }
  function draw(){
    bitsEl.innerHTML=bitHTML(data,true,'d');
    rxEl.innerHTML=bitHTML(rx,true,'r');
    bitsEl.querySelectorAll('.pbit').forEach(s=>s.onclick=()=>{const i=+s.dataset.i;data[i]^=1;rx[i]=data[i];draw();verdict();});
    rxEl.querySelectorAll('.pbit').forEach(s=>s.onclick=()=>{const i=+s.dataset.i;rx[i]^=1;draw();verdict();});
  }
  draw();verdict();
}

// ---- CH9: Why the link layer exists (3-gap animation) ----
function initWhy(){
  const host=document.getElementById('why-anim');
  const cap=document.getElementById('why-cap');
  let scene='frame', timer=null, raf=null;

  function clearTimers(){ if(timer){clearTimeout(timer);timer=null;} if(raf){cancelAnimationFrame(raf);raf=null;} }
  function tween(from,to,ms,onframe,done){
    if(raf)cancelAnimationFrame(raf);
    const t0=performance.now();
    (function fr(now){const k=Math.min(1,(now-t0)/ms);const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;onframe(from+(to-from)*e);if(k<1)raf=requestAnimationFrame(fr);else{raf=null;done&&done();}})(performance.now());
  }

  // ---------- scene templates ----------
  const BITS='0110100011010010';
  function frameSVG(){
    let bits='';
    for(let i=0;i<BITS.length;i++){
      bits+=`<text x="${30+i*24}" y="62" font-size="15" fill="#8b98a9" id="fb${i}" font-family="var(--mono)">${BITS[i]}</text>`;
    }
    return `<svg id="why-svg" viewBox="0 0 430 170" style="width:100%;max-width:430px;display:block;margin:auto">
      <text x="215" y="22" text-anchor="middle" font-size="11" fill="#ff5d5d" id="why-label">Problem: one unbroken bit-stream — where does a message start?</text>
      ${bits}
      <!-- frame envelope (hidden initially) -->
      <g id="env" opacity="0">
        <rect x="14" y="92" width="92" height="40" rx="6" fill="rgba(255,210,63,.10)" stroke="#ffd23f" stroke-width="1.4"/>
        <text x="60" y="108" text-anchor="middle" font-size="8" fill="#ffd23f">FLAG</text>
        <text x="60" y="121" text-anchor="middle" font-size="8" fill="#e6edf3">header</text>
        <rect x="110" y="92" width="200" height="40" rx="6" fill="rgba(74,163,255,.10)" stroke="#4aa3ff" stroke-width="1.4"/>
        <text x="210" y="115" text-anchor="middle" font-size="9" fill="#4aa3ff">DATA (the packet)</text>
        <rect x="314" y="92" width="92" height="40" rx="6" fill="rgba(255,210,63,.10)" stroke="#ffd23f" stroke-width="1.4"/>
        <text x="360" y="108" text-anchor="middle" font-size="8" fill="#ffd23f">FLAG</text>
        <text x="360" y="121" text-anchor="middle" font-size="8" fill="#e6edf3">trailer</text>
      </g>
    </svg>`;
  }
  function errSVG(){
    return `<svg id="why-svg" viewBox="0 0 460 180" style="width:100%;max-width:460px;display:block;margin:auto">
      <text x="230" y="20" text-anchor="middle" font-size="11" fill="#8b98a9" id="why-label">A frame is sent across a noisy link…</text>
      <!-- sender -->
      <rect x="14" y="60" width="96" height="44" rx="7" fill="#121821" stroke="#4aa3ff" stroke-width="1.4"/>
      <text x="62" y="80" text-anchor="middle" font-size="10" fill="#4aa3ff">SENDER</text>
      <text x="62" y="95" text-anchor="middle" font-size="9" fill="#8b98a9">data + CRC</text>
      <!-- receiver -->
      <rect x="350" y="60" width="96" height="44" rx="7" fill="#121821" stroke="#ff7a1a" stroke-width="1.4"/>
      <text x="398" y="80" text-anchor="middle" font-size="10" fill="#ff7a1a">RECEIVER</text>
      <text x="398" y="95" text-anchor="middle" font-size="9" fill="#8b98a9" id="rx-check">checks CRC</text>
      <!-- wire -->
      <line x1="110" y1="82" x2="350" y2="82" stroke="#243140" stroke-width="1.4" stroke-dasharray="5 6"/>
      <text x="230" y="120" text-anchor="middle" font-size="9" fill="#8b98a9">⚡ noise</text>
      <!-- frame packet -->
      <g id="ef" opacity="0">
        <rect id="ef-box" x="-34" y="-14" width="68" height="28" rx="5" fill="#161e2a" stroke="#33d6a6" stroke-width="1.4"/>
        <text id="ef-t" x="0" y="4" text-anchor="middle" font-size="9" fill="#33d6a6" font-family="var(--mono)">10110·CRC</text>
      </g>
      <text x="230" y="150" text-anchor="middle" font-size="11" id="err-verdict"></text>
    </svg>`;
  }
  function macSVG(){
    return `<svg id="why-svg" viewBox="0 0 460 200" style="width:100%;max-width:460px;display:block;margin:auto">
      <text x="230" y="18" text-anchor="middle" font-size="11" fill="#8b98a9" id="why-label">Three stations share one wire (broadcast medium)…</text>
      <!-- shared bus -->
      <line x1="40" y1="120" x2="420" y2="120" stroke="#4aa3ff" stroke-width="3" opacity=".5"/>
      <!-- stations -->
      <g font-size="9">
        <rect x="40" y="60" width="70" height="34" rx="6" fill="#121821" stroke="#33d6a6" stroke-width="1.3"/><text x="75" y="81" text-anchor="middle" fill="#33d6a6">A</text><line x1="75" y1="94" x2="75" y2="120" stroke="#33d6a6" stroke-width="1.3"/>
        <rect x="195" y="60" width="70" height="34" rx="6" fill="#121821" stroke="#ffd23f" stroke-width="1.3"/><text x="230" y="81" text-anchor="middle" fill="#ffd23f">B</text><line x1="230" y1="94" x2="230" y2="120" stroke="#ffd23f" stroke-width="1.3"/>
        <rect x="350" y="60" width="70" height="34" rx="6" fill="#121821" stroke="#b48cff" stroke-width="1.3"/><text x="385" y="81" text-anchor="middle" fill="#b48cff">C</text><line x1="385" y1="94" x2="385" y2="120" stroke="#b48cff" stroke-width="1.3"/>
      </g>
      <!-- signals -->
      <circle id="sigA" cx="75" cy="120" r="0" fill="none" stroke="#33d6a6" stroke-width="2" opacity="0"/>
      <circle id="sigB" cx="230" cy="120" r="0" fill="none" stroke="#ffd23f" stroke-width="2" opacity="0"/>
      <text x="230" y="160" text-anchor="middle" font-size="12" id="mac-verdict"></text>
    </svg>`;
  }

  // ---------- scene players ----------
  function playFrame(){
    cap.innerHTML="<b>Problem:</b> the physical layer delivers a continuous stream of bits with no punctuation — the receiver can't tell where one message ends and the next begins.";
    host.querySelectorAll('#fb0,#fb1').forEach(()=>{});
    const env=host.querySelector('#env');
    const label=host.querySelector('#why-label');
    // step 1: just bits (already shown). After delay, wrap into a frame.
    timer=setTimeout(()=>{
      label.setAttribute('fill','#33d6a6');
      label.textContent='Fix: FRAMING wraps the bits in flags → a recognizable frame';
      tween(0,1,500,v=>env.setAttribute('opacity',v));
      // fade raw bits up into the frame
      for(let i=0;i<BITS.length;i++){const b=host.querySelector('#fb'+i);if(b)tween(62,150,500,y=>b.setAttribute('y',y),null);}
      cap.innerHTML="<b>Fix — Framing:</b> the link layer adds a start <b>flag</b>, header, the data, and an end flag, so the receiver can chop the stream into discrete <b>frames</b>. <span style='color:var(--muted)'>(Like spaces between words in Morse code.)</span>";
    },1300);
  }
  function playErr(){
    cap.innerHTML="<b>Problem:</b> media are noisy — a bit can flip in transit (a 0 becomes a 1). Without a check, the receiver would accept corrupted data.";
    const ef=host.querySelector('#ef'); const box=host.querySelector('#ef-box'); const t=host.querySelector('#ef-t');
    const label=host.querySelector('#why-label'); const verdict=host.querySelector('#err-verdict');
    verdict.textContent=''; t.textContent='10110·CRC'; box.setAttribute('stroke','#33d6a6'); t.setAttribute('fill','#33d6a6');
    ef.setAttribute('opacity','1');
    // travel
    tween(62,398,1100,x=>ef.setAttribute('transform','translate('+x+',82)'),()=>{
      // bit flips mid-way already passed; now show corruption + detection
      label.setAttribute('fill','#ff5d5d'); label.textContent='⚡ A bit flipped on the wire!';
      t.textContent='10010·CRC'; box.setAttribute('stroke','#ff5d5d'); t.setAttribute('fill','#ff5d5d');
      timer=setTimeout(()=>{
        verdict.setAttribute('fill','#33d6a6');
        verdict.innerHTML='✓ CRC mismatch → error DETECTED → ask for resend (ARQ)';
        cap.innerHTML="<b>Fix — Error control:</b> the sender appends redundant check bits (<span class='kw'>CRC</span>). The receiver recomputes them; a mismatch reveals corruption, and <span class='kw'>ARQ</span> requests a retransmission. <b>Flow control</b> additionally stops a fast sender from swamping a slow receiver.";
      },700);
    });
    // mid-flight flip marker
    timer=setTimeout(()=>{ t.textContent='101↯0·CRC'; },650);
  }
  function playMac(){
    cap.innerHTML="<b>Problem:</b> on a shared wire, if two stations transmit at once their signals overlap and corrupt each other — a <b>collision</b>.";
    const A=host.querySelector('#sigA'), B=host.querySelector('#sigB');
    const label=host.querySelector('#why-label'), verdict=host.querySelector('#mac-verdict');
    verdict.textContent='';
    A.setAttribute('opacity','1');B.setAttribute('opacity','1');
    // both expand → collide
    tween(0,150,900,r=>{A.setAttribute('r',r);B.setAttribute('r',r);A.setAttribute('opacity',1-r/200);B.setAttribute('opacity',1-r/200);},()=>{
      label.setAttribute('fill','#ff5d5d');label.textContent='💥 A and B transmitted together → COLLISION';
      verdict.setAttribute('fill','#ff5d5d');verdict.textContent='✗ both messages destroyed';
      timer=setTimeout(()=>{
        // fix: only A sends
        A.setAttribute('r',0);B.setAttribute('r',0);A.setAttribute('opacity','1');B.setAttribute('opacity','0');
        label.setAttribute('fill','#33d6a6');label.textContent='Fix: MAC referees — B waits, only A transmits';
        verdict.setAttribute('fill','#33d6a6');verdict.textContent='✓ one at a time → no collision';
        tween(0,150,900,r=>{A.setAttribute('r',r);A.setAttribute('opacity',1-r/220);});
        cap.innerHTML="<b>Fix — MAC (Media Access Control):</b> a referee decides <b>who transmits when</b> — by sensing first (<span class='kw'>CSMA</span>), passing a token, or splitting the channel (FDMA/TDMA/CDMA). Only needed on <b>shared</b> links.";
      },1200);
    });
  }

  function mount(){
    clearTimers();
    if(scene==='frame')host.innerHTML=frameSVG();
    else if(scene==='err')host.innerHTML=errSVG();
    else host.innerHTML=macSVG();
    const intro={frame:"<b>Gap 1 — Framing.</b> Press ▶ Play to see the problem and fix.",
                 err:"<b>Gap 2 — Error control.</b> Press ▶ Play.",
                 mac:"<b>Gap 3 — MAC.</b> Press ▶ Play."};
    cap.innerHTML=intro[scene];
  }
  function play(){
    mount();
    if(scene==='frame')playFrame();
    else if(scene==='err')playErr();
    else playMac();
    if(window.attachGlossWithin)setTimeout(()=>window.attachGlossWithin(cap),50);
  }

  // tab switching
  host.parentElement.querySelectorAll('#why-tabs .tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      host.parentElement.querySelectorAll('#why-tabs .tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      scene=tab.dataset.pane; mount();
    });
  });
  document.getElementById('why-play').onclick=play;
  document.getElementById('why-reset').onclick=mount;
  mount();
}

// ---- CH9: byte stuffing ----
function initStuff(){
  const FLAG='F',ESC='E';
  function run(){
    const raw=(document.getElementById('stuff-in').value||'').replace(/\s/g,'');
    // stuff: before any F or E, insert ESC
    let stuffed='';
    for(const ch of raw){ if(ch===FLAG||ch===ESC) stuffed+=ESC; stuffed+=ch; }
    const framed=FLAG+stuffed+FLAG;
    // unstuff
    let un='',skip=false;
    const body=framed.slice(1,-1);
    for(let i=0;i<body.length;i++){ if(!skip&&body[i]===ESC){skip=true;continue;} un+=body[i];skip=false; }
    const ok=un===raw;
    const color=c=>c===FLAG?'var(--accent)':(c===ESC?'var(--yellow)':'var(--ink)');
    const render=str=>[...str].map(c=>`<span style="display:inline-block;min-width:18px;text-align:center;border:1px solid var(--line);margin:1px;padding:2px 4px;border-radius:4px;background:var(--panel2);color:${color(c)}">${c}</span>`).join('');
    document.getElementById('stuff-out').innerHTML=
      `<div style="margin:4px 0"><b>Raw:</b> ${render(raw)}</div>`+
      `<div style="margin:4px 0"><b>Sent frame (F…F, escapes stuffed):</b><br>${render(framed)}</div>`+
      `<div style="margin:4px 0"><b>Receiver unstuffs →</b> ${render(un)} ${ok?'<span style="color:var(--accent2)">✓ matches original</span>':'<span style="color:var(--bad)">mismatch</span>'}</div>`+
      `<div style="font-size:12px;color:var(--muted)">Orange = flag (frame boundary) · Yellow = stuffed escape byte. The escapes are removed by the receiver so the data is recovered exactly.</div>`;
  }
  document.getElementById('stuff-go').onclick=run; run();
}

// ---- CH10: Switch learning ----
function initSwitch(){
  let table={}; // mac->port
  const ports={H1:1,H2:2,H3:3,H4:4};
  const out=document.getElementById('sw-out');
  const tbl=document.getElementById('sw-table');
  function render(){
    let h='<table><tr><th>MAC (host)</th><th>Port</th></tr>';
    const keys=Object.keys(table);
    if(!keys.length)h+='<tr><td colspan="2" style="color:var(--muted)">empty — switch will flood</td></tr>';
    keys.forEach(k=>h+=`<tr><td>${k}</td><td>${table[k]}</td></tr>`);
    h+='</table>';tbl.innerHTML=h;
  }
  render();
  document.getElementById('sw-send').onclick=()=>{
    const s=document.getElementById('sw-src').value,d=document.getElementById('sw-dst').value;
    if(s===d){out.innerHTML='<span style="color:var(--bad)">Source and destination are the same — pick different hosts.</span>';return;}
    table[s]=ports[s]; // learns source
    let msg=`<b>Frame ${s}→${d}</b> arrives on port ${ports[s]}. Switch learns ${s}=port ${ports[s]}. `;
    if(table[d]) msg+=`<span style="color:var(--accent2)">Knows ${d}=port ${table[d]} → forwards directly (no flood) ✓</span>`;
    else msg+=`<span style="color:var(--yellow)">Doesn't know ${d} yet → floods to all other ports.</span>`;
    out.innerHTML=msg;render();
  };
  document.getElementById('sw-reset').onclick=()=>{table={};out.innerHTML='';render();};
}

  function render(){
    let h='';mipSteps.forEach((s,i)=>{const on=i<=step;
      h+=`<div class="flow-step" style="opacity:${on?1:.3}"><div class="n${i%2?' alt':''}">${i+1}</div><div><b>${s.t}</b>${on?'<br><span style="font-size:12.5px;color:var(--muted)">'+s.d+'</span>':''}</div></div>`;});
    stage.innerHTML=h;
  }
  render();
  document.getElementById('mip-next').onclick=()=>{if(step<mipSteps.length-1){step++;render();}};
  document.getElementById('mip-reset').onclick=()=>{step=0;render();};
}
LAB_INIT.ch12mip={fn:initMIP,done:false};

// ---- CH13: Nyquist/Shannon ----
function initRate(){
  const B=document.getElementById('r-b'),L=document.getElementById('r-l'),S=document.getElementById('r-s');
  function fmt(bps){
    if(bps>=1e6)return (bps/1e6).toFixed(2)+' Mbps';
    if(bps>=1e3)return (bps/1e3).toFixed(1)+' kbps';
    return Math.round(bps)+' bps';
  }
  function calc(){
    const b=+B.value,l=+L.value,snrDb=+S.value;
    document.getElementById('r-bv').textContent=b;
    document.getElementById('r-lv').textContent=l;
    document.getElementById('r-sv').textContent=snrDb;
    const nyq=2*b*Math.log2(l);
    const snr=Math.pow(10,snrDb/10);
    const sha=b*Math.log2(1+snr);
    document.getElementById('r-nyq').textContent=fmt(nyq);
    document.getElementById('r-sha').textContent=fmt(sha);
    const adv=document.getElementById('r-advice');
    if(nyq>sha) adv.innerHTML=`Your chosen <b>L=${l}</b> pushes Nyquist (${fmt(nyq)}) <b>above</b> the Shannon ceiling (${fmt(sha)}) — noise won't allow it. Lower L or improve SNR.`;
    else adv.innerHTML=`Nyquist (${fmt(nyq)}) is within the Shannon ceiling (${fmt(sha)}) — feasible. The real usable rate is the lower of the two.`;
  }
  [B,L,S].forEach(el=>el.oninput=calc);
  calc();
}
LAB_INIT.ch13={fn:()=>{initRate();initTDM();},done:false};

// ---- CH13: synchronous TDM calculator ----
function initTDM(){
  const ids=['t-n','t-r','t-bps','t-x'];
  function fmt(bps){
    if(bps>=1e6)return (bps/1e6).toFixed(bps%1e6?2:0)+' Mbps';
    if(bps>=1e3)return (bps/1e3).toFixed(bps%1e3?1:0)+' kbps';
    return Math.round(bps)+' bps';
  }
  function run(){
    const n=+document.getElementById('t-n').value;
    const rkbps=+document.getElementById('t-r').value;
    const bps=+document.getElementById('t-bps').value;
    const x=+document.getElementById('t-x').value;
    const r=rkbps*1000; // bits/sec per source
    const frameSize=n*bps+x;                 // bits per output frame
    const frameRate=r/bps;                   // frames/sec (one frame per 'bps' bits of each source)
    const duration=1/frameRate;              // seconds
    const dataRate=frameSize*frameRate;      // bits/sec
    const eff=(n*bps)/frameSize*100;
    document.getElementById('tdm-out').innerHTML=`
      <table style="margin-top:10px">
      <tr><th>Quantity</th><th>Formula</th><th>Result</th></tr>
      <tr><td>a. Output frame size</td><td>N×(bits/src) + extra</td><td><b>${n}×${bps} + ${x} = ${frameSize} bits</b></td></tr>
      <tr><td>b. Output frame rate</td><td>= input source rate / bits-per-slot</td><td><b>${fmt(frameRate*1).replace('bps','').trim()} = ${frameRate.toLocaleString()} frames/sec</b></td></tr>
      <tr><td>c. Frame duration</td><td>1 / frame rate</td><td><b>${(duration*1e6).toFixed(2)} µs</b></td></tr>
      <tr><td>d. Output data rate</td><td>frame size × frame rate</td><td><b style="color:var(--accent2)">${fmt(dataRate)}</b></td></tr>
      <tr><td>e. Efficiency</td><td>useful bits / total bits</td><td><b style="color:var(--accent)">${(n*bps)}/${frameSize} = ${eff.toFixed(1)}%</b></td></tr>
      </table>
      <div class="note cyan" style="margin-top:8px;font-size:12.5px">With the exam defaults (N=20, 100 kbps, 1 bit/slot, 1 extra bit): frame=21 bits, rate=100k frames/s, duration≈10 µs, data rate=<b>2.1 Mbps</b>, efficiency=<b>95.2%</b>. The duration the exam wrote as "0.21 ms" was a slip — 1/100,000 s = 10 µs.</div>`;
  }
  ids.forEach(id=>{const el=document.getElementById(id);if(el)el.oninput=run;});
  run();
}

// ---- MOCK EXAM ----
function initMock(){
  const sel={}; // qIndex -> chosenIndex
  const body=document.getElementById('mock-body');
  function render(){
    let h='';
    MOCK.forEach((q,i)=>{
      h+=`<div class="quiz-q" id="mq-${i}"><div class="qn">Q${i+1} · ${q[3]}</div><div class="qt">${q[0]}</div>`;
      q[1].forEach((opt,j)=>{
        const chosen=sel[i]===j;
        h+=`<div class="opt${chosen?' chosen':''}" data-q="${i}" data-j="${j}" style="${chosen?'border-color:var(--blue);background:rgba(74,163,255,.12)':''}">${String.fromCharCode(97+j)}) ${opt}</div>`;
      });
      h+=`<div class="explain" id="mex-${i}">${q[4]}</div></div>`;
    });
    body.innerHTML=h;
    body.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
      const qi=+o.dataset.q;
      if(document.getElementById('mock-body').dataset.graded)return;
      sel[qi]=+o.dataset.j; render(); updateCount();
    });
    updateCount();
  }
  function updateCount(){
    const n=Object.keys(sel).length;
    document.getElementById('mock-ans').textContent=n;
    document.getElementById('mock-bar').style.width=(n/MOCK.length*100)+'%';
  }
  document.getElementById('mock-grade').onclick=()=>{
    let score=0; const byTopic={};
    MOCK.forEach((q,i)=>{
      const t=q[3]; byTopic[t]=byTopic[t]||{c:0,n:0}; byTopic[t].n++;
      const box=document.getElementById('mq-'+i);
      const opts=box.querySelectorAll('.opt');
      opts.forEach((o,j)=>{
        o.style.cursor='default';
        if(j===q[2])o.classList.add('correct');
        if(sel[i]===j&&j!==q[2])o.classList.add('wrong');
      });
      document.getElementById('mex-'+i).classList.add('show');
      if(sel[i]===q[2]){score++;byTopic[t].c++;}
    });
    body.dataset.graded='1';
    document.getElementById('mock-score').textContent=score+' / '+MOCK.length;
    const pct=Math.round(score/MOCK.length*100);
    let grade = pct>=80?'🎯 Excellent':pct>=65?'✓ Solid':pct>=50?'Keep going':'Review needed';
    let rows=Object.keys(byTopic).map(t=>`<tr><td>${t}</td><td>${byTopic[t].c}/${byTopic[t].n}</td></tr>`).join('');
    document.getElementById('mock-result').innerHTML=
      `<div class="card tinted"><h3 style="margin-top:0">${grade} — ${pct}%</h3>
       <table style="margin-top:6px"><tr><th>Topic</th><th>Correct</th></tr>${rows}</table>
       <p style="font-size:12.5px;color:var(--muted);margin-top:8px">Scroll up to review every question — correct answers are green, your wrong picks are red, with explanations revealed.</p></div>`;
    document.getElementById('mock-result').scrollIntoView&&document.getElementById('mock-result').scrollIntoView({behavior:'smooth'});
  };
  document.getElementById('mock-reset').onclick=()=>{
    for(const k in sel)delete sel[k];
    delete body.dataset.graded;
    document.getElementById('mock-score').textContent='—';
    document.getElementById('mock-result').innerHTML='';
    render();
  };
  render();
}
LAB_INIT.mock={fn:initMock,done:false};

// ---- MEMORY TRICKS: flashcards ----
function initFlash(){
  let idx=0, flipped=false, got=0, seen=0;
  const card=document.getElementById('flash-card');
  const stat=document.getElementById('flash-stat');
  function setText(html,label){
    card.innerHTML='<div style="font-size:11px;color:var(--muted);letter-spacing:1px">'+label+'</div>'+
      '<div style="font-size:17px;margin-top:10px">'+html+'</div>';
  }
  function render(){
    if(flipped) setText('<span style="color:var(--accent2)">'+FLASH[idx][1]+'</span>','(answer — click to flip back)');
    else setText('<b>'+FLASH[idx][0]+'</b>','CLICK TO FLIP');
    stat.textContent=`Card ${idx+1} / ${FLASH.length}`+(seen?`  ·  ${got}/${seen} correct`:'');
    card.onclick=flip;
  }
  function flip(){flipped=!flipped;render();}
  function next(correct){
    seen++; if(correct)got++;
    if(idx<FLASH.length-1){idx++;flipped=false;render();}
    else{
      const pct=Math.round(got/seen*100);
      card.innerHTML='<div style="font-size:11px;color:var(--muted);letter-spacing:1px">DONE</div>'+
        '<div style="font-size:20px;margin-top:8px">'+(pct>=80?'🎯':'📚')+' '+got+' / '+seen+' correct ('+pct+'%)</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:6px">Tap to restart the deck</div>';
      stat.textContent='Finished — '+got+'/'+seen+' correct';
      card.onclick=()=>{idx=0;flipped=false;got=0;seen=0;render();};
    }
  }
  document.getElementById('flash-good').onclick=()=>next(true);
  document.getElementById('flash-bad').onclick=()=>next(false);
  render();
}
LAB_INIT.tricks={fn:initFlash,done:false};
