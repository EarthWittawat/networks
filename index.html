<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPE 314 — Networks Exam Lab (Ch. 7–13)</title>
<style>
:root{
  --bg:#0d1117; --panel:#121821; --panel2:#161e2a; --ink:#e6edf3; --muted:#8b98a9;
  --line:#243140; --accent:#ff7a1a; --accent2:#33d6a6; --blue:#4aa3ff; --violet:#b48cff;
  --yellow:#ffd23f; --grid:rgba(74,163,255,.06); --good:#33d6a6; --bad:#ff5d5d;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --disp:'Space Mono',var(--mono); --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--mono);background:var(--bg);color:var(--ink);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:32px 32px;
  font-size:15px;line-height:1.6;
}
a{color:var(--blue);text-decoration:none}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(180deg,#0a0e14,#0d1117);
  border-right:1px solid var(--line);padding:20px 14px;
}
.brand{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.5px;color:var(--ink);margin-bottom:2px}
.brand .tag{color:var(--accent)}
.brand-sub{font-size:11px;color:var(--muted);margin-bottom:18px;letter-spacing:.5px}
.navsec{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:16px 0 6px;padding-left:8px}
.navlink{
  display:flex;gap:10px;align-items:center;padding:8px 10px;border-radius:7px;
  color:var(--muted);font-size:12.5px;cursor:pointer;transition:.15s;border:1px solid transparent;
}
.navlink:hover{background:var(--panel2);color:var(--ink)}
.navlink.active{background:rgba(255,122,26,.12);color:var(--accent);border-color:rgba(255,122,26,.3)}
.navlink .ch{font-size:10px;color:var(--accent);font-weight:700;min-width:26px}
.progressbox{margin-top:18px;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
.progressbox .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.bar{height:6px;background:#1c2733;border-radius:4px;margin-top:6px;overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--yellow));width:0%;transition:.4s}

/* Main */
.main{padding:34px 44px 80px;max-width:1100px}
.crumb{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
h1.title{font-family:var(--mono);font-size:30px;margin:0 0 4px;font-weight:700;letter-spacing:-.5px}
h1.title .num{color:var(--accent)}
.lead{color:var(--muted);font-size:14px;max-width:760px;margin-bottom:24px}
.section{display:none;animation:fade .35s ease}
.section.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

h2{font-family:var(--mono);font-size:19px;margin:32px 0 12px;display:flex;align-items:center;gap:10px;letter-spacing:-.2px}
h2::before{content:"";width:14px;height:14px;background:var(--accent);clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);display:inline-block}
h3{font-size:15px;margin:20px 0 8px;color:var(--yellow);font-family:var(--mono)}
p{margin:8px 0}
.kw{color:var(--accent2);font-weight:600;background:rgba(51,214,166,.08);padding:1px 5px;border-radius:4px;font-size:.95em;border:1px solid rgba(51,214,166,.18)}
.kw[data-g]{cursor:help}
.kw[data-g]:hover{background:rgba(51,214,166,.18);border-color:var(--accent2)}
.term{color:var(--blue);font-weight:600;border-bottom:1px dashed rgba(74,163,255,.45);cursor:help}
.term:hover{color:#7dc0ff;border-bottom-style:solid}

.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:14px 0}
.card.tinted{background:linear-gradient(135deg,rgba(255,122,26,.06),rgba(51,214,166,.04))}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:820px){.grid2,.grid3{grid-template-columns:1fr}}

.note{border-left:3px solid var(--accent);background:rgba(255,122,26,.06);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:13.5px}
.note.cyan{border-color:var(--accent2);background:rgba(51,214,166,.06)}
.note.blue{border-color:var(--blue);background:rgba(74,163,255,.06)}
.exam{border-left:3px solid var(--yellow);background:rgba(255,210,63,.07);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:13px}
.exam b{color:var(--yellow)}
.trick{border-left:3px solid var(--violet);background:rgba(180,140,255,.08);padding:11px 14px 11px 42px;border-radius:0 8px 8px 0;margin:12px 0;font-size:13.5px;position:relative}
.trick::before{content:"🧠";position:absolute;left:12px;top:10px;font-size:18px}
.trick b{color:var(--violet)}
.trick .hook{display:inline-block;background:rgba(180,140,255,.18);border:1px solid rgba(180,140,255,.4);color:#d9c4ff;font-weight:700;padding:1px 8px;border-radius:6px;margin:0 2px;font-family:var(--mono)}

table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left}
th{background:var(--panel2);color:var(--yellow);font-weight:600;font-size:12px;letter-spacing:.3px}
tr:nth-child(even) td{background:rgba(255,255,255,.015)}

.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.pill.o{background:rgba(255,122,26,.15);color:var(--accent)}
.pill.g{background:rgba(51,214,166,.15);color:var(--accent2)}
.pill.b{background:rgba(74,163,255,.15);color:var(--blue)}
.pill.v{background:rgba(180,140,255,.15);color:var(--violet)}

button{font-family:var(--mono);cursor:pointer}
.btn{background:var(--accent);color:#0d1117;border:none;padding:8px 16px;border-radius:7px;font-weight:700;font-size:13px;transition:.15s}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:5px 11px;font-size:12px}

/* Interactive lab block */
.lab{background:linear-gradient(160deg,#10161f,#0c1118);border:1px solid var(--line);border-radius:14px;padding:18px;margin:18px 0;position:relative;overflow:hidden}
.lab::before{content:"INTERACTIVE";position:absolute;top:10px;right:12px;font-size:9px;letter-spacing:2px;color:var(--accent);opacity:.6}
.lab h4{margin:0 0 4px;font-size:14px;color:var(--accent2);font-family:var(--mono)}
.lab .desc{font-size:12px;color:var(--muted);margin-bottom:14px}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:10px 0}
input[type=range]{accent-color:var(--accent)}
input[type=number],input[type=text],select{
  background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:6px 9px;border-radius:6px;font-family:var(--mono);font-size:13px
}
.readout{font-size:13px;color:var(--ink)}
.readout b{color:var(--yellow)}
.bigval{font-size:26px;color:var(--accent2);font-weight:700}

/* Quiz */
.quiz-q{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin:12px 0}
.quiz-q .qn{font-size:11px;color:var(--accent);letter-spacing:1px}
.quiz-q .qt{font-weight:600;margin:6px 0 10px;font-size:14px}
.opt{display:block;padding:9px 12px;margin:6px 0;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:13px;transition:.12s}
.opt:hover{border-color:var(--blue)}
.opt.correct{border-color:var(--good);background:rgba(51,214,166,.12);color:var(--good)}
.opt.wrong{border-color:var(--bad);background:rgba(255,93,93,.1);color:var(--bad)}
.explain{font-size:12.5px;color:var(--muted);margin-top:8px;display:none;border-top:1px dashed var(--line);padding-top:8px}
.explain.show{display:block}

/* SVG diagram nodes */
.node{cursor:pointer}
svg text{font-family:var(--mono);fill:var(--ink)}

.tooltip{position:fixed;background:#05080c;border:1px solid var(--accent);color:var(--ink);
  padding:8px 11px;border-radius:7px;font-size:12px;max-width:260px;z-index:99;pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.6);display:none;line-height:1.45}
.tooltip b{color:var(--accent)}

.flow-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--line)}
.flow-step .n{min-width:26px;height:26px;border-radius:50%;background:var(--accent);color:#0d1117;display:grid;place-items:center;font-weight:700;font-size:13px}
.flow-step .n.alt{background:var(--accent2)}

.tabs{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.tab{padding:7px 13px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;color:var(--muted);cursor:pointer}
.tab.active{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700}
.tabpane{display:none}
.tabpane.show{display:block}

.cmp{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cmp > div{padding:14px 16px}
.cmp .left{background:rgba(74,163,255,.05);border-right:1px solid var(--line)}
.cmp .right{background:rgba(255,122,26,.05)}
.cmp h5{margin:0 0 8px;font-size:13px}
.cmp ul{margin:0;padding-left:16px;font-size:12.5px;color:var(--muted)}
.cmp li{margin:4px 0}

.keymap{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.keymap span{font-size:11px;background:var(--panel2);border:1px solid var(--line);padding:4px 10px;border-radius:20px;color:var(--accent2)}

footer{color:var(--muted);font-size:11px;margin-top:40px;border-top:1px solid var(--line);padding-top:14px}
.topbtn{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#0d1117;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;display:none;z-index:50}
@media(max-width:720px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.main{padding:20px}}
</style>
</head>

<div class="app">
  <aside class="sidebar">
    <div class="brand">NET<span class="tag">·</span>LAB</div>
    <div class="brand-sub">CPE 314 · EXAM PREP · CH 7–13</div>
    <nav id="nav"></nav>
    <div class="progressbox">
      <div class="lbl">Quiz progress</div>
      <div class="bar"><i id="pbar"></i></div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px" id="ptxt">0 / 0 answered</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="tooltip" id="tip"></div>
<button class="topbtn" id="topbtn" title="Back to top">↑</button>
<script>
// ============ NAV STRUCTURE ============
const SECTIONS = [
  {id:'home', ch:'', label:'Start Here', group:'OVERVIEW'},
  {id:'ch7', ch:'7', label:'Unicast Routing', group:'NETWORK LAYER'},
  {id:'ch8', ch:'8', label:'Network Management', group:'NETWORK LAYER'},
  {id:'ch9', ch:'9', label:'Link Layer & MAC', group:'DATA-LINK LAYER'},
  {id:'ch10', ch:'10', label:'Ethernet LANs', group:'DATA-LINK LAYER'},
  {id:'ch11', ch:'11', label:'SDN', group:'PROGRAMMABLE'},
  {id:'ch12', ch:'12', label:'Wireless & Mobile IP', group:'WIRELESS'},
  {id:'ch13', ch:'13', label:'Physical Layer & Media', group:'PHYSICAL LAYER'},
  {id:'mock', ch:'✎', label:'Mock Exam (40 Q)', group:'REVIEW'},
  {id:'tricks', ch:'🧠', label:'Memory Tricks', group:'REVIEW'},
  {id:'cheat', ch:'★', label:'Cheat Sheet', group:'REVIEW'},
];

// ============ GLOSSARY (for hover tooltips) ============
// data-g keys map here. Used by both .term (blue dashed) and .kw[data-g] (green keyword).
const GLOSS = {
  // --- Ch7 routing ---
  'datagram':'A packet at the network (IP) layer — self-contained and independently routed, carrying its own source & destination IP. Connectionless: best-effort, may arrive out of order.',
  'unicast routing':'One-to-one delivery — routing a datagram to a single destination (vs multicast/broadcast).',
  'AS':'Autonomous System — a large network or group of networks under one unified routing policy. The Internet is a collection of ASes.',
  'RIP':'Routing Information Protocol — distance-vector, uses HOP COUNT as its metric (max 15; 16 = infinity/unreachable).',
  'OSPF':'Open Shortest Path First — link-state protocol that uses Dijkstra to build least-cost trees within ONE Autonomous System.',
  'BGP':'Border Gateway Protocol — path-vector, the INTERDOMAIN (between-AS) routing protocol of the Internet.',
  'LSDB':'Link-State Database — every router floods its link costs so all routers build an IDENTICAL map of the whole network.',
  'Bellman-Ford':'The equation behind distance-vector: distance(x→y) = min over neighbors v of [cost(x,v) + distance(v,y)].',
  'Dijkstra':'Shortest-path algorithm used by link-state routing (OSPF) to compute the least-cost tree from the LSDB.',
  'least-cost tree':'The cheapest set of paths from one root node to every other node — what each routing algorithm computes.',
  'hop count':'A routing metric = number of routers (hops) a packet crosses. Used by RIP. Note: no hop is counted for a directly-connected network.',
  'forwarding table':'The table a router consults to decide the next hop for a datagram. Only routers need one — source & destination hosts use their default router.',
  'count-to-infinity':'A distance-vector problem where bad news (a failed link) propagates slowly, with distances slowly counting up. RIP caps it at 16 = infinity.',
  // --- Ch8 management ---
  'SNMP':'Simple Network Management Protocol — a manager (client) controls a set of agents (servers) over TCP/IP; defines the PDU packet formats.',
  'SMI':'Structure of Management Information — the GUIDELINE/RULES: names objects (OID), defines data types, and the encoding method (BER).',
  'MIB':'Management Information Base — the actual COLLECTION of named objects an agent stores; walked in lexicographic order.',
  'OID':'Object Identifier — a hierarchical, tree-structured name, e.g. the udp group = 1.3.6.1.2.1.7.',
  'lexicographic':'Dictionary order applied to OIDs: compare the integers number-by-number left to right; the first differing number decides order, and a prefix comes before a longer OID. This single sorted line is what lets GetNextRequest walk the whole MIB.',
  'BER':'Basic Encoding Rules — how SMI serializes object values onto the wire.',
  'manager':'The SNMP client (usually a host) that monitors and controls the network.',
  'agent':'The SNMP server (a router or host) that holds the MIB and responds to the manager.',
  'Trap':'An UNSOLICITED SNMP message sent from agent to manager to report that an event happened.',
  // --- Ch9 link layer ---
  'DLC':'Data Link Control — the upper data-link sublayer. Functions: framing, flow control, error control (ARQ) & error detection. Works on ANY link.',
  'MAC':'Media Access Control — the lower data-link sublayer that arbitrates WHO transmits on a shared (broadcast) medium.',
  'framing':'Packing bits into frames so each frame is distinguishable from the next, using delimiters/flags.',
  'byte stuffing':'In variable-size framing, a special escape byte is inserted before any data byte that accidentally matches the flag pattern, so it is not mistaken for a frame boundary.',
  'flag':'A special byte/bit pattern marking the start and end of a frame.',
  'flow control':'Procedures that limit how much data a sender transmits before it must wait for an acknowledgment.',
  'error control':'Detecting and correcting frame corruption — in the data-link layer it is based on ARQ (retransmission).',
  'ARQ':'Automatic Repeat reQuest — error control by retransmitting lost/corrupted frames.',
  'CSMA':'Carrier Sense Multiple Access — "sense before transmit": listen to the medium before sending to reduce (not remove) collisions.',
  'CSMA/CD':'CSMA with Collision Detection — abort the moment a collision is heard (used in wired Ethernet).',
  'CSMA/CA':'CSMA with Collision Avoidance — used in wireless, where collisions can’t be reliably detected; uses IFS, RTS/CTS, NAV & ACK.',
  'persistence':'The rule a CSMA station follows when the medium is busy: 1-persistent, non-persistent, or p-persistent.',
  'propagation delay':'Time for a signal to travel the medium. It is WHY collisions can still happen in CSMA — a far station may not yet hear an ongoing transmission.',
  'ALOHA':'The earliest random-access method (1970s). Pure ALOHA sends anytime (~18% efficiency); Slotted ALOHA only at slot starts (~37%).',
  'token passing':'A controlled-access method: a special token circulates a logical ring; only the token-holder may transmit.',
  'polling':'A controlled-access method where a primary device controls the link — Select (primary sends) and Poll (primary asks secondaries).',
  'NAV':'Network Allocation Vector — a virtual carrier-sense countdown timer other stations set during CSMA/CA so they stay silent.',
  'FDMA':'Frequency-Division Multiple Access — channelization by frequency band.',
  'TDMA':'Time-Division Multiple Access — channelization by time slot.',
  'CDMA':'Code-Division Multiple Access — all stations share one band, separated by orthogonal codes.',
  'CRC':'Cyclic Redundancy Check — a strong polynomial-division error-detection code placed in the frame trailer.',
  // --- Ch10 ethernet ---
  'VLAN':'Virtual LAN — a broadcast domain defined by SOFTWARE, not physical wiring. Membership by port, MAC, IP or IP-multicast.',
  'LLC':'Logical Link Control — the upper Ethernet sublayer (flow/error control & interface to the network layer).',
  '802.1Q':'IEEE tag added to frames crossing a VLAN trunk so the receiving switch knows which VLAN a frame belongs to.',
  'repeater':'A layer-1 device that only regenerates (boosts) signal strength to extend distance — it does NOT filter or read addresses.',
  'hub':'A multiport repeater — forwards bits to ALL ports (one collision domain). Layer 1.',
  'bridge':'A layer-2 device that filters/forwards frames by MAC address, separating collision domains.',
  'transparent switch':'A layer-2 switch that builds its forwarding table automatically by learning source MACs — "transparent" because hosts need no configuration.',
  'preamble':'7 bytes of alternating 1/0 at the start of an Ethernet frame to synchronize the receiver’s clock.',
  'SFD':'Start Frame Delimiter — 1 byte (10101011) signalling the real frame begins now.',
  // --- Ch11 SDN ---
  'SDN':'Software-Defined Networking — separates the CONTROL plane (decisions) from the DATA plane (forwarding), running control centrally on a controller.',
  'control plane':'The "brain" — decides HOW packets should be forwarded. In SDN it is pulled out of switches into a central controller.',
  'data plane':'The "muscle" — performs the actual movement of packets, following the flow tables it is given.',
  'controller':'The SDN "network operating system" holding network-wide state (link/host/switch info, flow tables, statistics).',
  'northbound API':'Interface between network-control apps and the controller (e.g. HTTP REST). Faces UP toward the apps.',
  'southbound API':'Interface between the controller and the switches (e.g. OpenFlow over TCP 6653, also SNMP). Faces DOWN toward switches.',
  'OpenFlow':'The dominant southbound protocol; runs over TCP port 6653; defines controller↔switch messages.',
  'flow table':'A switch’s match-plus-action table: match packet fields, then forward / drop / modify-field.',
  // --- Ch12 wireless ---
  'BSS':'Basic Service Set — the building block of an 802.11 WLAN: stations plus (usually) one access point (AP).',
  'ESS':'Extended Service Set — two or more BSSs joined by APs and a distribution system, enabling roaming.',
  'DCF':'Distributed Coordination Function — the basic 802.11 MAC access method, using CSMA/CA.',
  'PCF':'Point Coordination Function — an optional, infrastructure-only 802.11 access method using polling for time-sensitive traffic.',
  'piconet':'A Bluetooth network (one master + up to 7 active slaves).',
  'scatternet':'Two or more linked piconets.',
  'home agent':'A router on the mobile’s home network that intercepts packets and tunnels them to the mobile’s care-of address.',
  'foreign agent':'A router on the visited network that delivers tunneled packets to a roaming mobile.',
  'care-of address':'The temporary address a mobile obtains on a foreign network, registered with its home agent.',
  'triangle routing':'Mobile IP inefficiency: packets reach the mobile the long way (via the home agent) but replies go directly back — forming a triangle.',
  'WiMAX':'Worldwide Interoperability for Microwave Access — IEEE 802.16 (fixed) / 802.16e (mobile); a "last-mile" broadband alternative to DSL/cable.',
  'hidden terminal':'Two senders that can’t hear each other but both reach the receiver, causing collisions — solved by RTS/CTS.',
  // --- Ch13 physical ---
  'SNR':'Signal-to-Noise Ratio — average signal power ÷ average noise power. In dB: SNR(dB)=10·log₁₀(SNR).',
  'Nyquist':'Noiseless-channel bit-rate limit: BitRate = 2·B·log₂L, where B=bandwidth, L=number of signal levels.',
  'Shannon':'Noisy-channel capacity ceiling: C = B·log₂(1+SNR).',
  'attenuation':'Signal LOSES energy as it travels — fixed with amplifiers/repeaters. Measured in dB.',
  'distortion':'Signal CHANGES shape because different frequency components travel at different speeds.',
  'multiplexing':'A set of techniques that send multiple signals over one link simultaneously (FDM, WDM, TDM).',
  'FDM':'Frequency-Division Multiplexing — combines ANALOG signals into different frequency bands.',
  'WDM':'Wavelength-Division Multiplexing — FDM for light, used in fiber optics.',
  'TDM':'Time-Division Multiplexing — interleaves DIGITAL signals into time slots. Synchronous = fixed slots; Statistical = slots on demand.',
  'guided media':'Wired media with a physical conductor: twisted-pair & coax (electric current) and fiber (light).',
  'unguided media':'Wireless media — electromagnetic waves through free space (radio, microwave, infrared); no conductor.',
  'critical angle':'In fiber, the incidence angle above which light reflects totally inside the core (total internal reflection).',
  'single-mode':'A fiber type with a tiny core that carries one light path — least dispersion, best for long-haul.',
};

// ============ CHAPTER CONTENT ============
const C = {};

// ---------- HOME ----------
C.home = `
<div class="crumb">CPE 314 · COMPUTER NETWORKS</div>
<h1 class="title">Networks <span class="num">Exam Lab</span></h1>
<p class="lead">An interactive walkthrough of <b>Chapters 7–13</b> — routing, network management, the link layer, Ethernet, SDN, wireless/Mobile IP and the physical layer. Read the plain-English explanation, play with the live simulators, then test yourself with the quiz at the end of every chapter. Keywords you'll be expected to know are <span class="kw">highlighted like this</span>.</p>

<div class="grid3">
  <div class="card tinted"><span class="pill o">7–8</span><h3 style="margin-top:8px">Network Layer</h3><p style="font-size:13px;color:var(--muted)">How routers find paths (DV, LS, PV) and how we manage devices with SNMP/SMI/MIB.</p></div>
  <div class="card tinted"><span class="pill g">9–10</span><h3 style="margin-top:8px">Data-Link Layer</h3><p style="font-size:13px;color:var(--muted)">Framing, error detection, who-talks-when (MAC), and Ethernet evolution + VLANs.</p></div>
  <div class="card tinted"><span class="pill b">11–13</span><h3 style="margin-top:8px">SDN · Wireless · PHY</h3><p style="font-size:13px;color:var(--muted)">Programmable networks, 802.11 + Mobile IP, and signals, limits & cabling.</p></div>
</div>

<div class="note blue"><b>How to use this:</b> Click a chapter on the left. Hover any <span class="term" data-g="AS">dashed term</span> for a quick definition. Try every <b style="color:var(--accent2)">INTERACTIVE</b> block — they're built to drill the exact concepts exams love (routing tables, CRC, Nyquist/Shannon, Mobile IP phases…). Your quiz score tracker is bottom-left.</p></div>

<h2>The 7-chapter map in one breath</h2>
<div class="card">
<div class="flow-step"><div class="n">7</div><div><b>Unicast Routing</b> — A router's job is to move a datagram toward its destination. It builds a <span class="kw">least-cost tree</span> using one of three families: <span class="kw">Distance-Vector</span> (Bellman-Ford, RIP), <span class="kw">Link-State</span> (Dijkstra, OSPF), or <span class="kw">Path-Vector</span> (policy-based, BGP).</div></div>
<div class="flow-step"><div class="n">8</div><div><b>Network Management</b> — Once the network runs, you must watch and configure it. <span class="kw">SNMP</span> lets a <span class="kw">manager</span> poll <span class="kw">agents</span>, using <span class="kw">SMI</span> (naming/typing) and <span class="kw">MIB</span> (the object store).</div></div>
<div class="flow-step"><div class="n alt">9</div><div><b>Link Layer</b> — Splits into <span class="kw">DLC</span> (framing + error/flow control) and <span class="kw">MAC</span> (who gets the shared medium: random / controlled / channelization).</div></div>
<div class="flow-step"><div class="n alt">10</div><div><b>Ethernet LANs</b> — The dominant wired LAN. Standard→Fast→Gigabit→10G, all keeping the same <span class="kw">frame format</span>. Plus switches and <span class="kw">VLANs</span>.</div></div>
<div class="flow-step"><div class="n">11</div><div><b>SDN</b> — Rip the brain out of each switch. Separate the <span class="kw">control plane</span> from the <span class="kw">data plane</span> and run it on a central <span class="kw">controller</span> programmed via <span class="kw">north/southbound APIs</span>.</div></div>
<div class="flow-step"><div class="n">12</div><div><b>Wireless & Mobile IP</b> — <span class="kw">802.11</span> WLANs (BSS/ESS, CSMA/CA), Bluetooth, WiMAX, and how a host keeps its IP while roaming via <span class="kw">home/foreign agents</span>.</div></div>
<div class="flow-step" style="border:none"><div class="n">13</div><div><b>Physical Layer & Media</b> — Turning bits into signals: bandwidth, <span class="kw">Nyquist</span> & <span class="kw">Shannon</span> limits, impairments, multiplexing, and guided vs unguided media.</div></div>
</div>
`;

// ---------- CHAPTER 7: ROUTING ----------
C.ch7 = `
<div class="crumb">NETWORK LAYER · WEEK 7</div>
<h1 class="title"><span class="num">07</span> Unicast Routing</h1>
<p class="lead">The network layer's goal is to deliver a datagram from source to destination. When there's exactly one destination (one-to-one), that's <span class="kw">unicast routing</span>. Routers cooperate to discover the <span class="kw">least-cost path</span> through the internet, which we model as a weighted graph.</p>

<h2>The internet as a graph</h2>
<div class="card">
<p>Model the network as nodes (routers) and weighted edges (links). The cost of a route is the sum of edge weights. Every algorithm here is really just <i>"find the cheapest tree rooted at me to everyone else."</i> They differ only in <b>what info each router has</b> and <b>how it builds that tree</b>.</p>
<div class="keymap"><span>Least-cost routing</span><span>Least-cost tree</span><span>Graph = nodes + weighted edges</span></div>
</div>

<h2>The three routing families</h2>
<div class="grid3">
  <div class="card"><span class="pill b">DISTANCE-VECTOR</span><h3 style="margin-top:8px">"Tell neighbors my distances"</h3><p style="font-size:13px">Each router knows only <b>local</b> info. Uses the <span class="kw">Bellman-Ford</span> equation, shares its whole <span class="kw">distance vector</span> with direct neighbors periodically. → <span class="term" data-g="RIP">RIP</span>.</p></div>
  <div class="card"><span class="pill o">LINK-STATE</span><h3 style="margin-top:8px">"Everyone knows the whole map"</h3><p style="font-size:13px">Each router floods its link costs so all build an identical <span class="term" data-g="LSDB">LSDB</span>, then runs <span class="kw">Dijkstra</span> locally. → <span class="term" data-g="OSPF">OSPF</span>.</p></div>
  <div class="card"><span class="pill v">PATH-VECTOR</span><h3 style="margin-top:8px">"Cheapest isn't always allowed"</h3><p style="font-size:13px">Source picks the best path using <span class="kw">policy</span>, carrying the full path to avoid loops. → <span class="term" data-g="BGP">BGP</span>.</p></div>
</div>

<h3>Bellman-Ford in one line</h3>
<div class="note cyan">Distance from <b>x</b> to <b>y</b> = the minimum, over every neighbor <b>v</b>, of <code>cost(x,v) + distance(v,y)</code>. In words: <i>"the cheapest way to reach y is to step to my best neighbor and use their best-known distance to y."</i> This is the heart of distance-vector.</div>

<div class="trick"><b>Memory trick — which algorithm goes with which?</b><br>
Remember <span class="hook">LSD</span> = <b>L</b>ink-<b>S</b>tate uses <b>D</b>ijkstra. By elimination, Distance-Vector uses Bellman-Ford.<br>
And: <i>"Bellman asks his Buddies, Dijkstra sees the Diagram."</i> → Bellman-Ford only knows neighbors (<b>local</b>); Dijkstra needs the whole map / LSDB (<b>global</b>).</div>

<div class="lab" id="lab-dv">
  <h4>⚙ Distance-Vector convergence simulator</h4>
  <div class="desc">A 4-router network (A–B–C–D in a line + a shortcut). Click <b>Exchange Round</b> to let each router share its vector with neighbors. Watch distances converge to the true least cost.</div>
  <div id="dv-graph"></div>
  <div class="controls">
    <button class="btn sm" id="dv-step">▶ Exchange Round</button>
    <button class="btn sm ghost" id="dv-reset">↺ Reset</button>
    <span class="readout">Round: <b id="dv-round">0</b> · <span id="dv-state" style="color:var(--accent2)">Only direct links known</span></span>
  </div>
  <div id="dv-tables"></div>
</div>

<h2>Distance-Vector vs Link-State (exam favourite)</h2>
<div class="cmp">
  <div class="left"><h5 style="color:var(--blue)">Distance-Vector</h5><ul>
    <li>Bandwidth: <b>less</b> (share with neighbors only, no flooding)</li>
    <li>Knowledge: <b>local</b> — only what neighbors report</li>
    <li>Algorithm: <b>Bellman-Ford</b></li>
    <li>Converges <b>slowly</b> — "good news fast, bad news slow"</li>
    <li>Suffers <b>count-to-infinity</b></li>
  </ul></div>
  <div class="right"><h5 style="color:var(--accent)">Link-State</h5><ul>
    <li>Bandwidth: <b>more</b> (floods large LSPs)</li>
    <li>Knowledge: <b>global</b> — full network map (LSDB)</li>
    <li>Algorithm: <b>Dijkstra</b></li>
    <li>Converges <b>faster</b></li>
    <li><b>No</b> count-to-infinity</li>
  </ul></div>
</div>

<h2>Intradomain vs Interdomain & real protocols</h2>
<div class="card">
<p>The Internet is hierarchical: each ISP is an <span class="term" data-g="AS">Autonomous System (AS)</span> with its own policy. Inside an AS you run an <b>intradomain</b> protocol; between ASes you run an <b>interdomain</b> protocol.</p>
<table>
<tr><th>Protocol</th><th>Family</th><th>Scope</th><th>Metric / key idea</th></tr>
<tr><td><span class="term" data-g="RIP">RIP</span></td><td>Distance-Vector</td><td>Intradomain</td><td><span class="kw">Hop count</span>, max <b>15</b> hops (16 = ∞, prevents loops)</td></tr>
<tr><td><span class="term" data-g="OSPF">OSPF</span></td><td>Link-State</td><td>Intradomain (within one AS)</td><td>Dijkstra least-cost tree, configurable metric</td></tr>
<tr><td><span class="term" data-g="BGP">BGP</span></td><td>Path-Vector</td><td>Interdomain</td><td>Policy-based best path, carries AS path (loop-free)</td></tr>
</table>
</div>
<div class="exam"><b>Exam trap:</b> RIP's "15 max hops" isn't a network-size limit for fun — the <b>16th</b> hop means <i>unreachable (infinity)</i>, which is how RIP caps the count-to-infinity problem.</div>

<div class="trick"><b>Memory tricks for the protocols</b><br>
• <span class="hook">RIP rests at 16</span> — RIP counts hops up to 15; <b>16 = infinity = the route is dead (R.I.P.)</b>.<br>
• <span class="hook">BGP = Between Gateways' Politics</span> — <b>B</b>order <b>G</b>ateway <b>P</b>rotocol is the <b>between-AS (interdomain)</b> protocol and is <b>policy</b>-based.<br>
• <span class="hook">OSPF lives at home</span> — OSPF is <b>intra</b>domain (inside one AS), the "open" link-state choice.</div>

<div class="note"><b>Why path-vector exists:</b> least-cost routing can't stop a packet from crossing an AS you don't want it to (e.g. for policy/political reasons). Path-vector lets the <b>source decide</b> based on policy, not just cost — and by carrying the whole path, a router can reject any path that already contains itself (loop prevention).</div>

<h2>Why is routing the network layer's job? (2017 B1)</h2>
<div class="card">
<p>Routing happens at the <b>network layer</b> — not transport or data-link — because:</p>
<table>
<tr><th>Layer</th><th>Scope of delivery</th><th>Why it can't route end-to-end</th></tr>
<tr><td>Data-link</td><td><b>Node-to-node</b> (one hop)</td><td>Only sees the next adjacent node; no global addressing across networks.</td></tr>
<tr><td><b>Network</b></td><td><b>Host-to-host</b> across networks</td><td>✓ Has global IP addressing & forwarding tables — the only layer that sees the whole internetwork path.</td></tr>
<tr><td>Transport</td><td><b>Process-to-process</b></td><td>Assumes the packet already arrived at the host; doesn't deal with intermediate routers at all.</td></tr>
</table>
<p style="font-size:13px;color:var(--muted)">In short: only the network layer has both the <b>global addressing</b> and the <b>per-hop forwarding tables</b> needed to move a <span class="kw" data-g="datagram">datagram</span> across many networks.</p>
</div>

<div id="quiz-ch7"></div>
`;

// ---------- CHAPTER 8: NETWORK MANAGEMENT ----------
C.ch8 = `
<div class="crumb">NETWORK LAYER · WEEK 8</div>
<h1 class="title"><span class="num">08</span> Network Management</h1>
<p class="lead">Once a network runs, someone has to watch it, fix it, and tune it. <span class="kw">Network management</span> covers five areas, and on the Internet it's done with one dominant standard: <span class="term" data-g="SNMP">SNMP</span>, which leans on two helpers — <span class="term" data-g="SMI">SMI</span> and <span class="term" data-g="MIB">MIB</span>.</p>

<h2>The five areas of network management</h2>
<div class="grid3">
  <div class="card"><span class="pill b">CONFIG</span><p style="font-size:13px;margin-top:6px"><b>Configuration</b> — track & set device settings.</p></div>
  <div class="card"><span class="pill o">FAULT</span><p style="font-size:13px;margin-top:6px"><b>Fault</b> — detect, isolate, fix failures.</p></div>
  <div class="card"><span class="pill g">PERFORMANCE</span><p style="font-size:13px;margin-top:6px"><b>Performance</b> — monitor throughput, utilization, delay.</p></div>
  <div class="card"><span class="pill v">ACCOUNTING</span><p style="font-size:13px;margin-top:6px"><b>Accounting</b> — who uses what (for billing/quotas).</p></div>
  <div class="card"><span class="pill o">SECURITY</span><p style="font-size:13px;margin-top:6px"><b>Security</b> — control access & protect data.</p></div>
  <div class="card tinted"><p style="font-size:12px;margin-top:6px">Memory hook: <b style="color:var(--yellow)">C-F-P-A-S</b></p></div>
</div>

<div class="trick"><b>Memory tricks for management</b><br>
• 5 areas <span class="hook">"Cats Fight, People Argue, Stop!"</span> → <b>C</b>onfiguration, <b>F</b>ault, <b>P</b>erformance, <b>A</b>ccounting, <b>S</b>ecurity.<br>
• The trio: <span class="hook">SMI names it · MIB keeps it · SNMP moves it</span>. (SM<b>I</b> = <b>I</b>dentify/name, M<b>I</b>B = the data<b>B</b>ase, SN<b>M</b>P = <b>M</b>essages.)<br>
• <span class="hook">A TRAP is sprung</span> — nobody asked for it. Trap = the <b>only unsolicited</b> message, agent → manager.</div>

<h2>The 3 cooperating protocols</h2>
<div class="card">
<p>Management on the Internet = teamwork of three. A <span class="kw">manager</span> (host running SNMP client) controls a set of <span class="kw">agents</span> (routers/hosts running SNMP server).</p>
<table>
<tr><th>Protocol</th><th>Role (memorize the verbs!)</th></tr>
<tr><td><b style="color:var(--accent)">SNMP</b></td><td>Defines the <b>format of packets</b> (PDUs) swapped between manager & agent; reads and changes object values.</td></tr>
<tr><td><b style="color:var(--blue)">SMI</b></td><td><b>Names</b> objects (OID), defines <b>data types</b> (range/length) & the <b>encoding</b> method (BER). It's the <i>guideline / rules</i>.</td></tr>
<tr><td><b style="color:var(--accent2)">MIB</b></td><td>The actual <b>collection of named objects</b> and their relationships in a managed entity. The <i>database</i>.</td></tr>
</table>
</div>
<div class="note cyan"><b>Analogy:</b> Think of a spreadsheet. <span class="kw">SMI</span> = the rules for naming columns and what type each holds. <span class="kw">MIB</span> = the actual filled-in sheet of values. <span class="kw">SNMP</span> = the messages you send to read/write a cell.</div>

<div class="lab" id="lab-snmp">
  <h4>⚙ SNMP request walkthrough — animated</h4>
  <div class="desc">A manager asks an agent: <i>"how many UDP datagrams have you received?"</i> Watch the <b>GetRequest</b> packet travel to the agent, the agent look up its <b>MIB</b>, and a <b>Response</b> carry the value back. Press play, or step through phase by phase.</div>
  <div id="snmp-anim"></div>
  <div class="controls" style="margin-top:4px">
    <button class="btn sm" id="snmp-play">▶ Play</button>
    <button class="btn sm ghost" id="snmp-prev">◀ Prev</button>
    <button class="btn sm ghost" id="snmp-next">Next ▶</button>
    <button class="btn sm ghost" id="snmp-reset">↺ Reset</button>
    <span class="readout" style="margin-left:6px">Phase <b id="snmp-pn">0</b>/5</span>
  </div>
  <div id="snmp-cap" style="margin-top:10px;font-size:13px"></div>
</div>

<h2>SMI — the three attributes of an object</h2>
<div class="grid3">
  <div class="card"><h3 style="margin-top:0">① Name</h3><p style="font-size:13px">An <span class="term" data-g="OID">Object Identifier (OID)</span> — a hierarchical name from a tree, e.g. the udp group is <code>1.3.6.1.2.1.7</code>.</p></div>
  <div class="card"><h3 style="margin-top:0">② Type</h3><p style="font-size:13px">The data type stored in the object (with range & length).</p></div>
  <div class="card"><h3 style="margin-top:0">③ Encoding</h3><p style="font-size:13px"><span class="kw">BER</span> (Basic Encoding Rules) — how the value is serialized onto the wire.</p></div>
</div>

<h3>Accessing MIB variables (the OID trick)</h3>
<div class="card">
<p>Use the <b>udp group</b> (<code>1.3.6.1.2.1.7</code>) as the example:</p>
<table>
<tr><th>Kind</th><th>How to build the OID</th><th>Example</th></tr>
<tr><td><b>Simple variable</b></td><td>group ID <b>+</b> variable ID</td><td><code>udpInDatagrams → ...7.1</code></td></tr>
<tr><td><b>Table entry</b></td><td>table ID <b>+</b> column <b>+</b> row index</td><td><code>udpLocalAddress → ...7.5.1.1</code></td></tr>
</table>
<p style="font-size:12.5px;color:var(--muted)">MIB uses <span class="kw" data-g="lexicographic">lexicographic ordering</span> to walk its variables — that's what makes <code>GetNextRequest</code> able to "walk the tree."</p>
</div>

<h2>Lexicographic ordering — how the MIB sorts itself</h2>
<p><b>Lexicographic = "dictionary order."</b> In a dictionary you compare words letter-by-letter and sort by the <b>first position where they differ</b> ("cab" before "cat" because b &lt; t). The MIB does the same thing, but on the <b>integers of each <span class="term" data-g="OID">OID</span></b> instead of letters — comparing number-by-number, left to right.</p>

<div class="grid2">
  <div class="card"><h3 style="margin-top:0">The rule</h3>
  <p style="font-size:13px">Compare two OIDs position by position:</p>
  <ul style="font-size:12.5px;color:var(--muted)">
    <li>First differing number decides the order (smaller comes first).</li>
    <li>A shorter OID that is a <b>prefix</b> of a longer one comes first — like "car" before "cargo" (so <code>...7.5</code> precedes <code>...7.5.1.1</code>).</li>
  </ul>
  </div>
  <div class="card"><h3 style="margin-top:0">Why it matters</h3>
  <p style="font-size:13px">Everything sits in <b>one predictable sorted line</b>, so the agent can always answer <i>"what object comes next?"</i> — which is exactly what <code>GetNextRequest</code> needs.</p>
  </div>
</div>

<div class="lab" id="lab-lex">
  <h4>⚙ Walk the MIB with GetNextRequest</h4>
  <div class="desc">The agent's objects are stored in lexicographic order of their OIDs (shown sorted below). Press <b>GetNext</b> to make the manager walk from one object to the next — notice it visits every entry, including each table row, with no idea in advance how many there are.</div>
  <div id="lex-list"></div>
  <div class="controls" style="margin-top:8px">
    <button class="btn sm" id="lex-next">▶ GetNext</button>
    <button class="btn sm ghost" id="lex-reset">↺ Reset</button>
    <span class="readout" style="margin-left:6px" id="lex-msg">Manager starts at the top of the udp group.</span>
  </div>
</div>

<div class="exam"><b>Exam line:</b> MIB variables are arranged in <b>lexicographic order</b> of their OIDs, which is what lets <code>GetNextRequest</code> walk through every object — including unknown table rows — one at a time.</div>
<div class="trick"><b>Memory trick</b><br><span class="hook">Lexicographic = dictionary order, but for numbers</span> — compare the OID's integers left-to-right, just like spelling out a word letter-by-letter. "Next" always means the next entry in that one sorted line.</div>

<h2>SNMP PDUs (the message types)</h2>
<div class="keymap" style="margin-bottom:10px">
<span>GetRequest</span><span>GetNextRequest</span><span>GetBulkRequest</span><span>SetRequest</span><span>Response</span><span>Trap</span><span>InformRequest</span><span>Report</span>
</div>
<table>
<tr><th>PDU</th><th>Who sends</th><th>Purpose</th></tr>
<tr><td>GetRequest</td><td>Manager→Agent</td><td>Read one/more variables</td></tr>
<tr><td>GetNextRequest</td><td>Manager→Agent</td><td>Read the <i>next</i> variable (walk the MIB)</td></tr>
<tr><td>GetBulkRequest</td><td>Manager→Agent</td><td>Retrieve large blocks efficiently</td></tr>
<tr><td>SetRequest</td><td>Manager→Agent</td><td>Write/change a variable</td></tr>
<tr><td>Response</td><td>Agent→Manager</td><td>Reply with values</td></tr>
<tr><td><b style="color:var(--accent)">Trap</b></td><td>Agent→Manager</td><td><b>Unsolicited</b> alert (event happened!)</td></tr>
<tr><td>InformRequest</td><td>Manager→Manager</td><td>Manager-to-manager info</td></tr>
</table>

<h3>SNMPv3 security (USM + VACM)</h3>
<div class="note blue">SNMPv3 keeps the same PDUs/SMI/MIB but wraps them in security. <span class="kw">USM</span> (User-based Security Model) = per-user <b>authentication</b> (HMAC-MD5/SHA) + <b>privacy</b> (DES/AES) + replay protection. <span class="kw">VACM</span> (View-based Access Control Model) = which parts of the MIB a user may read/write.</div>

<div id="quiz-ch8"></div>
`;

C.ch9 = `
<div class="crumb">DATA-LINK LAYER · WEEK 9</div>
<h1 class="title"><span class="num">09</span> Link Layer · Framing, Errors & MAC</h1>
<p class="lead">The data-link layer moves frames between <b>two adjacent nodes</b>. It splits into two sublayers: <span class="term" data-g="DLC">DLC</span> (works on any link) and <span class="term" data-g="MAC">MAC</span> (only matters on shared/broadcast links — who gets to talk?).</p>

<h2>Why do we even need this layer?</h2>
<p>The physical layer can only push <b>raw bits</b> down a wire — no concept of "messages," no promise they arrive intact, no rule for who may talk on a shared wire. The link layer exists to fill exactly <b>three gaps</b>, which is why the chapter is named <i>Framing, Errors &amp; MAC</i>. Press play to watch each gap — and its fix.</p>

<div class="lab" id="lab-why">
  <h4>⚙ The three gaps the link layer fills</h4>
  <div class="desc">Each scene shows the <b style="color:var(--bad)">problem</b> with raw bits, then the link-layer <b style="color:var(--accent2)">fix</b>.</div>
  <div class="tabs whytabs" id="why-tabs">
    <div class="tab active" data-pane="frame">① Framing</div>
    <div class="tab" data-pane="err">② Error control</div>
    <div class="tab" data-pane="mac">③ MAC</div>
  </div>
  <div id="why-anim"></div>
  <div class="controls" style="margin-top:4px">
    <button class="btn sm" id="why-play">▶ Play</button>
    <button class="btn sm ghost" id="why-reset">↺ Reset</button>
  </div>
  <div id="why-cap" style="margin-top:10px;font-size:13px"></div>
</div>

<div class="note cyan"><b>One-sentence answer:</b> the physical layer only moves raw bits, so <i>someone</i> must package them into recognizable <b>frames</b>, verify they arrived <b>uncorrupted</b>, and arbitrate who may use a <b>shared medium</b>. That someone is the data-link layer — framing / errors / MAC are exactly those three jobs.</div>

<h2>Two sublayers</h2>
<div class="cmp">
  <div class="left"><h5 style="color:var(--blue)">DLC — Data Link Control</h5><ul>
    <li>Common to point-to-point <b>and</b> broadcast links</li>
    <li><b>Framing</b> — pack bits so frames are distinguishable</li>
    <li><b>Flow control</b> — limit how much sender sends before an ACK</li>
    <li><b>Error control</b> — based on <span class="kw">ARQ</span> (retransmission)</li>
    <li>Error detection & correction</li>
  </ul></div>
  <div class="right"><h5 style="color:var(--accent)">MAC — Media Access Control</h5><ul>
    <li>Only for <b>shared (broadcast)</b> links</li>
    <li>Decides <b>who transmits when</b></li>
    <li>3 families: random, controlled, channelization</li>
  </ul></div>
</div>

<h2>Framing — fixed vs variable size (exam topic)</h2>
<p>The data-link layer must mark where each frame starts and ends. Two strategies:</p>
<div class="cmp">
  <div class="left"><h5 style="color:var(--blue)">Fixed-size framing</h5><ul>
    <li>Every frame is the same length</li>
    <li>No delimiter needed — size itself defines the boundary</li>
    <li>Example: ATM cells</li>
  </ul></div>
  <div class="right"><h5 style="color:var(--accent)">Variable-size framing</h5><ul>
    <li>Frames differ in length → need a <span class="kw" data-g="flag">flag</span> (delimiter) to mark boundaries</li>
    <li>Problem: what if the flag pattern appears inside the data?</li>
    <li>Solution: <span class="kw" data-g="byte stuffing">byte stuffing</span> (char-oriented) or bit stuffing</li>
  </ul></div>
</div>
<div class="exam"><b>From the 2017 paper (Q8 & Q6):</b> "In <u>fixed-size</u> framing we do NOT need a delimiter." And "In <u>byte stuffing</u>, a special byte is added to the data section when a character has the same pattern as the <u>flag</u>." Memorize: stuffing protects the <b>flag</b>.</div>

<h2>Error detection — interactive parity & checksum</h2>
<p>The receiver must catch corruption. The link layer adds redundant bits computed from the data. Try flipping a bit and watch detection succeed or (for weak schemes) fail.</p>

<div class="trick"><b>Memory trick — two sublayers</b><br>
<span class="hook">DLC = any Date · MAC = Many Compete</span><br>
<b>DLC</b> works on <b>any</b> link (point-to-point or shared). <b>MAC</b> only matters when <b>many</b> stations <b>compete</b> for one shared medium.</div>

<div class="lab" id="lab-parity">
  <h4>⚙ Parity & checksum playground</h4>
  <div class="desc">Edit the 8-bit data word. We compute even <b>parity</b> and a simple <b>checksum</b>. Then flip bits in the "received" copy to simulate errors.</div>
  <div class="controls">
    <span class="readout">Data word:</span>
    <span id="parity-bits"></span>
  </div>
  <div class="controls">
    <span class="readout">Even parity bit: <b id="parity-bit">0</b></span>
    <span class="readout" style="margin-left:18px">8-bit checksum: <b id="checksum-val">00</b></span>
  </div>
  <div class="controls">
    <span class="readout">Received (click to corrupt):</span>
    <span id="rx-bits"></span>
  </div>
  <div class="readout" id="parity-verdict" style="margin-top:6px"></div>
</div>

<div class="note cyan"><b>Reality check:</b> single-bit parity catches any <b>odd</b> number of flipped bits but misses even counts. That's why real Ethernet uses <span class="kw">CRC</span> (cyclic redundancy check) — far stronger polynomial-division-based detection in the frame's trailer.</div>

<h2>Multiple Access Protocols — the big tree</h2>
<p>When stations share one medium (a wire or the air), they need a referee. Three families:</p>

<div class="note blue"><b>Why do collisions still happen in CSMA? (2017 Q11)</b> Because of <span class="kw" data-g="propagation delay">propagation delay</span>. Station A may start sending, but station B — far away — hasn't heard it yet, so B also starts → collision. Sensing helps but can't eliminate this window.</div>

<div class="tabs" id="mac-tabs">
  <div class="tab active" data-pane="rand">Random Access</div>
  <div class="tab" data-pane="ctrl">Controlled Access</div>
  <div class="tab" data-pane="chan">Channelization</div>
</div>

<div class="tabpane show" id="pane-rand">
  <div class="card">
  <p>No station is the boss; each decides on its own whether to send, based on the medium's state. Contention → collisions possible.</p>
  <table>
  <tr><th>Method</th><th>Idea</th></tr>
  <tr><td><b>Pure ALOHA</b></td><td>Send whenever; collide; back off & retry. ~18% efficiency.</td></tr>
  <tr><td><b>Slotted ALOHA</b></td><td>Only send at slot starts → halves collision window (~37%).</td></tr>
  <tr><td><b>CSMA</b></td><td><span class="kw">Carrier sense</span>: listen <i>before</i> sending. Persistence methods decide what to do if busy.</td></tr>
  <tr><td><b>CSMA/CD</b></td><td>+ <b>Collision Detection</b> — abort the moment you hear a collision (wired Ethernet).</td></tr>
  <tr><td><b>CSMA/CA</b></td><td>+ <b>Collision Avoidance</b> — used in wireless (can't detect collisions on radio); uses IFS, RTS/CTS, NAV.</td></tr>
  </table>
  </div>
</div>
<div class="tabpane" id="pane-ctrl">
  <div class="card">
  <p>Stations consult each other; you can't send unless authorized.</p>
  <table>
  <tr><th>Method</th><th>Idea</th></tr>
  <tr><td><b>Reservation</b></td><td>Reserve a slot before sending data.</td></tr>
  <tr><td><b>Polling</b></td><td>A <b>primary</b> controls the link. <b>Select</b> = primary has data to send out; <b>Poll</b> = primary asks secondaries if they have data.</td></tr>
  <tr><td><b>Token Passing</b></td><td>A special <span class="kw">token</span> circulates a logical ring; only the token-holder may transmit.</td></tr>
  </table>
  </div>
</div>
<div class="tabpane" id="pane-chan">
  <div class="card">
  <p>Bandwidth is split among stations — by frequency, time, or code. (Mostly used in wireless, covered more in Ch.12.)</p>
  <table>
  <tr><th>Method</th><th>Splits by</th></tr>
  <tr><td><b>FDMA</b></td><td><b>Frequency</b> — each station gets its own band.</td></tr>
  <tr><td><b>TDMA</b></td><td><b>Time</b> — each station gets time slots.</td></tr>
  <tr><td><b>CDMA</b></td><td><b>Code</b> — all share one band, separated by orthogonal codes.</td></tr>
  </table>
  </div>
</div>

<div class="lab" id="lab-csma">
  <h4>⚙ CSMA/CD vs CSMA/CA</h4>
  <div class="desc">Two stations want to transmit. Pick a protocol and run the scenario to see how each handles a near-simultaneous attempt.</div>
  <div class="controls">
    <button class="tab active" id="csma-cd" style="border-radius:7px">CSMA/CD (wired)</button>
    <button class="tab" id="csma-ca" style="border-radius:7px">CSMA/CA (wireless)</button>
    <button class="btn sm" id="csma-run">▶ Run scenario</button>
  </div>
  <div id="csma-log" style="font-size:13px;margin-top:6px"></div>
</div>

<div class="trick"><b>Memory trick — CD vs CA (the #1 confusion)</b><br>
<span class="hook">Wired CD · Wireless CA</span><br>
Think of a music <b>CD</b> — a physical disc you hold = <b>wired</b>, Collision <b>D</b>etection. Going cable-less = <b>CA</b>, Collision <b>A</b>voidance. <i>"The Air can't Detect, so it Avoids."</i><br>
Also: <span class="hook">"Sense before you sentence"</span> = CSMA listens to the carrier before transmitting. And <span class="hook">"Slotted doubles it"</span> — Slotted ALOHA (~37%) ≈ 2× Pure ALOHA (~18%).</div>

<div class="exam"><b>Exam trap:</b> Wireless uses <b>CA, not CD</b>. A radio can't reliably hear its own collisions (hidden terminal), so it <i>avoids</i> collisions with <span class="term" data-g="NAV">NAV</span>/RTS-CTS instead of detecting them. Note: some slides loosely say DCF "uses CSMA/CD" — the correct access method for 802.11 DCF is <b>CSMA/CA</b>.</div>

<div class="crumb">DATA-LINK LAYER · WEEK 10</div>
<h1 class="title"><span class="num">10</span> Ethernet LANs</h1>
<p class="lead">Ethernet is the most widely used LAN protocol. Its data-link layer = <span class="kw">LLC</span> sublayer (logical link control) + <span class="kw">MAC</span> sublayer (runs <span class="kw">CSMA/CD</span> & framing). The genius of its evolution: every generation kept the <b>same frame format</b> and address length.</p>

<h2>The Ethernet frame (memorize the field sizes)</h2>
<div class="lab" id="lab-frame">
  <h4>⚙ Anatomy of an Ethernet frame</h4>
  <div class="desc">Hover/click each field to learn its size and job.</div>
  <div id="frame-svg"></div>
  <div id="frame-info" class="readout" style="margin-top:8px;min-height:40px"></div>
</div>
<table>
<tr><th>Field</th><th>Size</th><th>Job</th></tr>
<tr><td>Preamble</td><td>7 bytes</td><td>56 bits alternating 1/0 — sync the receiver clock</td></tr>
<tr><td>SFD</td><td>1 byte</td><td>Start Frame Delimiter (10101011) — "frame starts now"</td></tr>
<tr><td>Destination addr</td><td>6 bytes</td><td>MAC address of receiver</td></tr>
<tr><td>Source addr</td><td>6 bytes</td><td>MAC address of sender</td></tr>
<tr><td>Type</td><td>2 bytes</td><td>Upper-layer protocol</td></tr>
<tr><td>Data + padding</td><td>46–1500 bytes</td><td>Payload (min 46 keeps min frame size)</td></tr>
<tr><td>CRC</td><td>4 bytes</td><td>Error detection</td></tr>
</table>
<div class="note cyan">Min frame = <b>512 bits / 64 bytes</b>; Max frame = <b>12,144 bits / 1518 bytes</b> (payload 46–1500). The minimum exists so CSMA/CD can detect collisions before a sender finishes transmitting.</div>

<div class="trick"><b>Memory tricks — Ethernet frame</b><br>
• Field sizes in order: <span class="hook">7-1-6-6-2-…-4</span> (Preamble 7, SFD 1, Dst 6, Src 6, Type 2, Data, CRC 4). The <b>two 6s</b> are the <b>two 6-byte MAC addresses</b> — Destination first, then Source.<br>
• <span class="hook">MAC = 48 = 6 × 8</span> — a MAC address is 48 bits = 6 bytes.<br>
• <span class="hook">"64 in, 1518 out"</span> — min frame 64 B, max frame 1518 B.</div>

<h2>Ethernet evolution</h2>
<table>
<tr><th>Generation</th><th>Rate</th><th>Standard</th><th>What stayed the same</th></tr>
<tr><td>Standard Ethernet</td><td>10 Mbps</td><td>—</td><td>The baseline</td></tr>
<tr><td>Fast Ethernet</td><td>100 Mbps</td><td>—</td><td>MAC sublayer, frame format, min/max size unchanged</td></tr>
<tr><td>Gigabit Ethernet</td><td>1 Gbps</td><td>802.3z</td><td>Address length, frame format, min/max length kept</td></tr>
<tr><td>10-Gigabit Ethernet</td><td>10 Gbps</td><td>—</td><td>Same frame, fiber-focused</td></tr>
</table>
<div class="exam"><b>Exam point:</b> the recurring theme is <b>backward compatibility</b> — each speed bump kept the frame format and address length identical, so only the physical layer & implementation changed.</div>

<h2>Connecting devices (heavily tested in 2017)</h2>
<p>Know exactly which OSI layer each device works at and what it does:</p>
<table>
<tr><th>Device</th><th>Layer</th><th>What it does</th></tr>
<tr><td><span class="kw" data-g="repeater">Repeater</span></td><td>1 (Physical)</td><td>Only <b>regenerates signal strength</b> to extend distance. Does NOT amplify noise, read addresses, or connect different segments logically.</td></tr>
<tr><td><span class="kw" data-g="hub">Hub</span></td><td>1 (Physical)</td><td>A <b>multiport repeater</b> — repeats bits to all ports. One big collision domain.</td></tr>
<tr><td><span class="kw" data-g="bridge">Bridge</span></td><td>2 (Data-link)</td><td>Filters & forwards frames by <b>MAC address</b>, splitting collision domains.</td></tr>
<tr><td>Layer-2 switch<br><span style="font-size:11px;color:var(--muted)">= multiport bridge</span></td><td>2 (Data-link)</td><td>Many-port bridge. A <span class="kw" data-g="transparent switch">transparent switch</span> auto-learns MAC→port (no config needed).</td></tr>
<tr><td>Layer-3 switch</td><td>3 (Network)</td><td>Switch that also routes using IP — used to create VLANs & limit broadcast domains.</td></tr>
</table>
<div class="exam"><b>2017 Q22/Q23/Q21:</b> "Repeaters regenerate signal strength, they do NOT <u>extend time</u>." · "A layer-2 switch is also called a <u>multiport switch/bridge</u>." · To <u>increase bandwidth and limit broadcast domains</u> → use <u>VLAN switches</u>.</div>

<div class="trick"><b>Memory trick — device layers</b><br>
<span class="hook">"Repeaters &amp; Hubs are brainless (L1), Bridges/Switches read MACs (L2), Routers read IP (L3)"</span><br>
Climbing the ladder: <b>1</b> = just electricity (repeater/hub), <b>2</b> = MAC addresses (bridge/switch), <b>3</b> = IP addresses (router/L3 switch). The higher the layer, the "smarter" the device.</div>

<h2>Standard Ethernet implementations & cable lengths</h2>
<table>
<tr><th>Implementation</th><th>Medium</th><th>Max segment length</th></tr>
<tr><td>10Base5 (thick coax)</td><td>Thick coaxial</td><td><b>500 m</b></td></tr>
<tr><td>10Base2 (thin coax)</td><td>Thin coaxial</td><td><b>185 m</b> (≈200)</td></tr>
<tr><td>10Base-T</td><td>Twisted pair (UTP)</td><td><b>100 m</b></td></tr>
<tr><td>10Base-F</td><td>Fiber</td><td><b>2000 m</b></td></tr>
</table>

<div class="trick"><b>Memory trick — 10Base lengths</b><br>
<span class="hook">"Multiply the number by 100"</span> → 10Base<b>5</b> = <b>500</b> m, 10Base<b>2</b> ≈ <b>200</b> m (officially 185). And <span class="hook">T = Twisted = 100 m</span>, <span class="hook">F = Fiber = Far = 2000 m</span>.</div>

<h2>Switches, VLANs & trunking</h2>
<div class="card">
<p>A switch forwards frames by learning which MAC lives on which port. A <span class="term" data-g="VLAN">VLAN</span> is a broadcast domain defined <b>by software, not physical wiring</b>. Membership can be by port number, MAC address, IP address, or IP multicast address.</p>
<h3>VLAN trunking</h3>
<p>To connect VLANs across switches scalably, configure a <span class="kw">trunk port</span> belonging to <b>all</b> VLANs. The IEEE <span class="kw">802.1Q</span> tag is added to frames crossing the trunk so the far switch knows which VLAN each frame belongs to.</p>

<div class="crumb">PROGRAMMABLE NETWORKS · WEEK 11</div>
<h1 class="title"><span class="num">11</span> Software-Defined Networking</h1>
<p class="lead">Traditional networks bake the "brain" (routing logic) into every box, making them rigid. <span class="term" data-g="SDN">SDN</span>'s big idea: <b>separate the control plane from the data plane</b> and run the control logic centrally on a <span class="kw">controller</span> — making the network programmable, flexible and centrally managed. The term grew out of <span class="kw">OpenFlow</span> at Stanford.</p>

<h2>Control plane vs Data plane</h2>
<div class="cmp">
  <div class="left"><h5 style="color:var(--blue)">Control plane — "the brain"</h5><ul>
    <li>Decides <b>how</b> packets should be forwarded</li>
    <li>In SDN: pulled out of switches, runs on a central <b>controller</b></li>
    <li>Programmable via apps (routing, access control, load balancing)</li>
  </ul></div>
  <div class="right"><h5 style="color:var(--accent)">Data plane — "the muscle"</h5><ul>
    <li>Does the actual <b>movement of packets</b></li>
    <li>Lives in the SDN-controlled switches</li>
    <li>Just follows <b>flow tables</b> it's given</li>
  </ul></div>
</div>

<h2>SDN architecture — interactive layers</h2>
<div class="lab" id="lab-sdn">
  <h4>⚙ The three-layer SDN stack</h4>
  <div class="desc">Click a layer to see what it does and which API connects it to the next.</div>
  <div id="sdn-svg"></div>
  <div id="sdn-info" class="readout" style="margin-top:8px;min-height:46px"></div>
</div>

<div class="card">
<table>
<tr><th>Component</th><th>Role</th></tr>
<tr><td><b>Network-control apps</b></td><td>Routing, access control, load balancing — the "what should the network do" logic.</td></tr>
<tr><td><b style="color:var(--accent2)">Northbound API</b></td><td>Between apps and controller (e.g. HTTP <b>REST</b>). "App talks down to controller."</td></tr>
<tr><td><b>SDN Controller</b></td><td>The network OS — keeps network-wide state (link-state, host info, flow tables, statistics).</td></tr>
<tr><td><b style="color:var(--accent)">Southbound API</b></td><td>Between controller and switches (e.g. <b>OpenFlow</b> over TCP/6653, also SNMP). "Controller talks down to switches."</td></tr>
<tr><td><b>SDN-controlled switches</b></td><td>Data plane — match-plus-action flow tables.</td></tr>
</table>
</div>
<div class="note cyan"><b>Memory hook:</b> <b>North</b>bound faces <b>up</b> to the apps; <b>South</b>bound faces <b>down</b> to the switches. OpenFlow = southbound, runs on <b>TCP port 6653</b>.</div>

<div class="trick"><b>Memory tricks — SDN</b><br>
• <span class="hook">"North to the Nerds, South to the Switches"</span> — Northbound API faces <b>up</b> to the apps (the programmers/nerds); Southbound faces <b>down</b> to the switches (OpenFlow, TCP 6653).<br>
• <span class="hook">"Control = brain, Data = muscle"</span> — the control plane <b>decides</b>, the data plane just <b>moves packets</b>.<br>
• Picture a map compass: <b>up = North</b>. Apps sit on top, so they're reached via the <b>North</b>bound API.</div>

<h2>Flow tables: Match-plus-Action</h2>
<div class="card">
<p>Each switch holds a <span class="kw">flow table</span>. For every packet it finds the matching rule and applies the action: <b>forward</b>, <b>drop</b>, or <b>modify-field</b>. This is <span class="kw">generalized forwarding</span> — far more flexible than destination-only routing.</p>
</div>

<div class="lab" id="lab-flow">
  <h4>⚙ Build a flow-table rule</h4>
  <div class="desc">Classic exam question: packets arriving at switch s2. Set match conditions + action and add the rule to s2's flow table.</div>
  <div class="controls">
    <label>In-port <select id="f-port"><option>1</option><option>2</option><option>*</option></select></label>
    <label>Src host <select id="f-src"><option>h1/h2</option><option>h5/h6</option><option>any</option></select></label>
    <label>Dst host <select id="f-dst"><option>h1/h2</option><option>h3/h4</option><option>h5/h6</option></select></label>
    <label>Action <select id="f-act"><option>Forward port 1</option><option>Forward port 2</option><option>Deliver to host</option><option>Drop</option></select></label>
    <button class="btn sm" id="f-add">+ Add rule</button>
  </div>
  <div id="flow-table"></div>
</div>

<h2>Reacting to a topology change (the 6-step loop)</h2>
<div class="card">
<div class="flow-step"><div class="n">1</div><div>Switch detects <b>link s1–s2 down</b> → sends a <span class="kw">Port-status</span> message (OpenFlow) up.</div></div>
<div class="flow-step"><div class="n">2</div><div>Controller updates its <b>link-state info</b> via the link-state manager.</div></div>
<div class="flow-step"><div class="n">3</div><div>It <b>notifies</b> registered apps that the link-state changed.</div></div>
<div class="flow-step"><div class="n alt">4</div><div>The routing app (<b>Dijkstra link-state routing</b>) <b>recomputes paths</b>.</div></div>
<div class="flow-step"><div class="n alt">5</div><div>App updates the <b>flow tables</b> in the controller.</div></div>
<div class="flow-step" style="border:none"><div class="n alt">6</div><div>Controller <b>distributes</b> new tables to affected switches.</div></div>
</div>

<div class="note blue"><b>Implementations:</b> Proprietary — ONIX, Juniper, Google. Open-source — <span class="kw">OpenDaylight</span>, <span class="kw">ONOS</span>.</div>

C.ch12 = `
<div class="crumb">WIRELESS · WEEK 12</div>
<h1 class="title"><span class="num">12</span> Wireless Networks & Mobile IP</h1>
<p class="lead">Wireless changes the rules: the medium is air (broadcast, error-prone), hosts move, and you can't detect collisions. We cover <span class="kw">802.11</span> WLANs, Bluetooth, WiMAX, and how <span class="kw">Mobile IP</span> lets a roaming host keep its IP address.</p>

<h2>Wired vs Wireless — architectural comparison</h2>
<div class="cmp">
  <div class="left"><h5 style="color:var(--blue)">Wired LAN</h5><ul>
    <li>Medium: copper/fiber, contained</li>
    <li>Hosts physically attached</li>
    <li>Collisions <b>detectable</b> (CSMA/CD)</li>
  </ul></div>
  <div class="right"><h5 style="color:var(--accent)">Wireless LAN</h5><ul>
    <li>Medium: air, shared with anyone in range</li>
    <li>Hosts mobile; signal fades & errors</li>
    <li>Collisions hard to detect → <b>CSMA/CA</b></li>
  </ul></div>
</div>

<h2>IEEE 802.11 architecture</h2>
<div class="grid2">
  <div class="card"><h3 style="margin-top:0"><span class="term" data-g="BSS">BSS</span> — Basic Service Set</h3><p style="font-size:13px">The building block: stations + (usually) one <b>access point (AP)</b>. Without an AP it's an ad-hoc/independent BSS.</p></div>
  <div class="card"><h3 style="margin-top:0"><span class="term" data-g="ESS">ESS</span> — Extended Service Set</h3><p style="font-size:13px">Two or more BSSs joined by APs + a distribution system → covers a larger area. Enables roaming between BSSs.</p></div>
</div>
<div class="note cyan">Station mobility types: <b>no-transition</b> (stationary), <b>BSS-transition</b> (moves within one ESS), <b>ESS-transition</b> (moves between ESSs).</div>

<div class="trick"><b>Memory trick — BSS vs ESS</b><br>
<span class="hook">"BSS is a Box, ESS is an Estate"</span><br>
<b>B</b>SS = one <b>B</b>asic cell (a single AP + its stations). <b>E</b>SS = <b>E</b>xtended — many BSSs joined into one big estate, so you can roam between them.</div>

<h3>MAC sublayer: DCF & PCF</h3>
<table>
<tr><th>Function</th><th>Access method</th><th>Notes</th></tr>
<tr><td><b>DCF</b> (Distributed Coordination Function)</td><td><span class="kw">CSMA/CA</span></td><td>The basic, distributed method</td></tr>
<tr><td><b>PCF</b> (Point Coordination Function)</td><td><span class="kw">Polling</span></td><td>Optional, infrastructure-only, for time-sensitive traffic</td></tr>
</table>

<div class="lab" id="lab-ca">
  <h4>⚙ CSMA/CA with RTS / CTS / NAV</h4>
  <div class="desc">Step through the handshake that lets wireless avoid collisions and tame the hidden-terminal problem.</div>
  <div id="ca-stage"></div>
  <div class="controls"><button class="btn sm" id="ca-next">▶ Next</button><button class="btn sm ghost" id="ca-reset">↺ Reset</button></div>
</div>
<div class="note blue"><b>Hidden vs Exposed terminal:</b> <i>Hidden</i> — two senders can't hear each other but both reach the receiver → collision (RTS/CTS fixes this). <i>Exposed</i> — a station needlessly defers because it hears a transmission that wouldn't actually collide.</div>

<h2>Other wireless tech</h2>
<div class="grid2">
  <div class="card"><h3 style="margin-top:0">Bluetooth</h3><p style="font-size:13px">Connects gadgets in a small area; a Bluetooth net = <span class="kw">piconet</span>; linked piconets = <span class="kw">scatternet</span>. Layers map to OSI: <b>L2CAP≈LLC</b>, <b>Baseband≈MAC (TDMA)</b>, <b>Radio≈PHY</b>.</p></div>
  <div class="card"><h3 style="margin-top:0">WiMAX</h3><p style="font-size:13px">IEEE <b>802.16</b> (fixed) / <b>802.16e</b> (mobile). "Last-mile" broadband — a potential alternative to DSL/cable.</p></div>
</div>

<h2>Mobile IP — keeping your IP while roaming</h2>
<p>An IP address encodes <i>where</i> you are. So when a host leaves its home network, how do packets still find it? Mobile IP uses two helpers and a temporary address.</p>
<div class="grid3">
  <div class="card"><h3 style="margin-top:0">Home Agent</h3><p style="font-size:12.5px">Router on the home network. Intercepts packets for the mobile and tunnels them onward.</p></div>
  <div class="card"><h3 style="margin-top:0">Foreign Agent</h3><p style="font-size:12.5px">Router on the visited network. Delivers tunneled packets to the mobile.</p></div>
  <div class="card"><h3 style="margin-top:0">Care-of Address</h3><p style="font-size:12.5px">The mobile's temporary address on the foreign network.</p></div>
</div>

<div class="lab" id="lab-mip">
  <h4>⚙ Mobile IP — the three phases</h4>
  <div class="desc">Walk a packet from a remote host to a mobile that's away from home. Watch agent discovery → registration → data transfer (and triangle routing).</div>
  <div id="mip-stage"></div>
  <div class="controls"><button class="btn sm" id="mip-next">▶ Next phase</button><button class="btn sm ghost" id="mip-reset">↺ Reset</button></div>
</div>
<div class="exam"><b>Exam concept — triangle routing (inefficiency):</b> a packet from the remote host goes <b>Home Agent → tunnel → mobile</b>, but the mobile's reply can go <b>directly</b> back. The "there's the long way in, short way out" triangle is the classic Mobile IP inefficiency.</div>

<div class="trick"><b>Memory trick — Mobile IP</b><br>
• Three pieces: <span class="hook">Home · Foreign · Care-of</span>. Story: you travel abroad (<b>Foreign</b> network), get a temporary <b>Care-of</b> address, and your <b>Home</b> agent forwards your mail to you.<br>
• <span class="hook">"Long way in, short way out"</span> = triangle routing. Mail detours through home (long), your reply goes straight back (short) → a triangle.</div>

<div id="quiz-ch12"></div>

<div class="crumb">PHYSICAL LAYER · WEEK 13</div>
<h1 class="title"><span class="num">13</span> Physical Layer & Transmission Media</h1>
<p class="lead">The bottom of the stack: turning bits into <b>electromagnetic signals</b> and pushing them down a medium. Here we care about data-rate limits, what degrades signals, how to share a link (multiplexing), and the cables/airwaves themselves.</p>

<h2>Data-rate limits — the two formulas you WILL be tested on</h2>
<p>How fast can we send bits? It depends on <b>bandwidth</b>, <b>number of signal levels</b>, and <b>channel quality (noise)</b>. Two formulas:</p>

<div class="lab" id="lab-rate">
  <h4>⚙ Nyquist & Shannon calculator</h4>
  <div class="desc">Drag the sliders. Nyquist gives the <b>noiseless</b> max rate (you choose levels L); Shannon gives the <b>noisy</b> ceiling from SNR. In practice you use both.</div>
  <div class="controls">
    <label>Bandwidth B: <b id="r-bv">3000</b> Hz<br><input type="range" id="r-b" min="500" max="20000" step="500" value="3000" style="width:180px"></label>
    <label style="margin-left:18px">Signal levels L: <b id="r-lv">4</b><br><input type="range" id="r-l" min="2" max="256" step="1" value="4" style="width:180px"></label>
    <label style="margin-left:18px">SNR (dB): <b id="r-sv">30</b><br><input type="range" id="r-s" min="0" max="60" step="1" value="30" style="width:180px"></label>
  </div>
  <div class="grid2" style="margin-top:10px">
    <div class="card"><div style="font-size:11px;color:var(--muted)">NYQUIST (noiseless)</div><div class="readout" style="font-size:12px;margin:4px 0">BitRate = 2 × B × log₂L</div><div class="bigval" id="r-nyq">—</div></div>
    <div class="card"><div style="font-size:11px;color:var(--muted)">SHANNON (noisy ceiling)</div><div class="readout" style="font-size:12px;margin:4px 0">C = B × log₂(1 + SNR)</div><div class="bigval" id="r-sha" style="color:var(--accent)">—</div></div>
  </div>
  <div class="note cyan" style="margin-top:8px" id="r-advice"></div>
</div>
<div class="exam"><b>Worked example (from your slides):</b> send 265 kbps over a noiseless 20 kHz channel. Nyquist → log₂L = 6.625 → L ≈ 98.7 levels. Not a power of 2, so round: <b>128 levels → 280 kbps</b> or <b>64 levels → 240 kbps</b>. Use the calculator above with B=20000 to reproduce it.</div>

<div class="trick"><b>Memory trick — which formula?</b><br>
<span class="hook">"Shannon hears Noise (SNR) · Nyquist counts Levels (L)"</span><br>
<b>S</b>hannon = <b>S</b>NR = the <b>noisy</b> ceiling. <b>Nyquist</b> = uses the number of signal <b>levels L</b> = the <b>noiseless</b> ideal. In real life the usable rate is the <b>lower</b> of the two.</div>

<h2>Transmission impairment — what wrecks a signal</h2>
<div class="grid3">
  <div class="card"><h3 style="margin-top:0">Attenuation</h3><p style="font-size:12.5px">Signal <b>loses energy</b> over distance. Fixed with amplifiers/repeaters. Measured in dB.</p></div>
  <div class="card"><h3 style="margin-top:0">Distortion</h3><p style="font-size:12.5px">Signal <b>changes shape</b> — different frequency components travel at different speeds.</p></div>
  <div class="card"><h3 style="margin-top:0">Noise</h3><p style="font-size:12.5px">Unwanted energy added. Quantified by <span class="term" data-g="SNR">SNR</span> = signal power ÷ noise power; SNR(dB)=10·log₁₀(SNR).</p></div>
</div>

<h2>Multiplexing — many signals, one link</h2>
<div class="trick"><b>Memory tricks — physical layer</b><br>
• 3 impairments spell <span class="hook">A-N-D</span>: <b>A</b>ttenuation (energy loss), <b>N</b>oise (added junk), <b>D</b>istortion (shape change).<br>
• Multiplexing: <span class="hook">"Frequency–Time–Wavelength"</span> → <b>F</b>DM = <b>F</b>requency (analog), <b>T</b>DM = <b>T</b>ime (digital), <b>W</b>DM = <b>W</b>avelength (light/fiber). Letter matches the thing it splits.<br>
• <span class="hook">"Guided has a guide-wire; Unguided is up in the air"</span> — guided = wired (copper/fiber), unguided = wireless.</div>
<div class="card">
<p><span class="kw" data-g="multiplexing">Multiplexing</span> = sending multiple signals across one data link simultaneously. As traffic grows, instead of laying new links we install a high-bandwidth link and share it.</p>
<table>
<tr><th>Type</th><th>Shares by</th><th>Used for</th></tr>
<tr><td><span class="kw" data-g="FDM">FDM</span></td><td>Frequency bands</td><td><b>Analog</b> signals (radio, cable TV) — the one that combines analog</td></tr>
<tr><td><span class="kw" data-g="WDM">WDM</span></td><td>Wavelengths (light)</td><td>Fiber optics (FDM for light)</td></tr>
<tr><td><span class="kw" data-g="TDM">TDM</span></td><td>Time slots</td><td><b>Digital</b> signals</td></tr>
</table>
</div>

<h3>Synchronous vs Statistical TDM</h3>
<div class="cmp">
  <div class="left"><h5 style="color:var(--blue)">Synchronous TDM</h5><ul>
    <li>Each source gets a <b>fixed, pre-assigned</b> slot every frame</li>
    <li>Empty slots are still sent (wasted) if a source has no data</li>
    <li>Simple, but can be inefficient</li>
  </ul></div>
  <div class="right"><h5 style="color:var(--accent)">Statistical TDM</h5><ul>
    <li>Slots assigned <b>on demand</b>, only to sources with data</li>
    <li>Needs addressing in each slot (more overhead per slot)</li>
    <li>Higher efficiency under bursty traffic</li>
  </ul></div>
</div>

<div class="lab" id="lab-tdm">
  <h4>⚙ Synchronous TDM calculator (2017 C3 — worth 7 points!)</h4>
  <div class="desc">Combine N digital sources with synchronous TDM. Each output slot carries 1 bit per source, plus optional sync/framing bits. Reproduces the exam's worked answer.</div>

    <label>Bits/source/slot: <input type="number" id="t-bps" value="1" min="1" style="width:60px"></label>
    <label>Extra (framing) bits/frame: <input type="number" id="t-x" value="1" min="0" style="width:60px"></label>
  </div>
  <div id="tdm-out"></div>
</div>

<h2>Transmission media (layer "zero")</h2>
<div class="tabs" id="media-tabs">
  <div class="tab active" data-pane="guided">Guided (wired)</div>
  <div class="tab" data-pane="unguided">Unguided (wireless)</div>
</div>
<div class="tabpane show" id="pane-guided">
  <div class="card">
  <p>A physical conduit directs the signal. Copper carries <b>electric current</b>; fiber carries <b>light</b>.</p>
  <table>
  <tr><th>Medium</th><th>Carries</th><th>Notes</th></tr>
  <tr><td><b>Twisted-pair</b></td><td>Electric current</td><td>Cheap, common (UTP/STP); telephone & LAN</td></tr>
  <tr><td><b>Coaxial</b></td><td>Electric current</td><td>Higher bandwidth than twisted pair; cable TV</td></tr>
  <tr><td><b>Fiber-optic</b></td><td>Light</td><td>Core + cladding (<span class="kw" data-g="critical angle">total internal reflection</span>). When the ray hits below the <span class="kw" data-g="critical angle">critical angle</span> it refracts and escapes; at/above it reflects and stays in the core. Modes: multimode step-index, multimode graded-index, <span class="kw" data-g="single-mode">single-mode</span> (best, long-haul).</td></tr>
  </table>
  </div>
</div>
<div class="tabpane" id="pane-unguided">
  <div class="card">
  <p>No conductor — EM waves through free space (wireless). Available to anyone in range.</p>
  <table>

  <tr><td><b>Radio waves</b></td><td>Omnidirectional</td><td>AM/FM, broadcast</td></tr>
  <tr><td><b>Microwaves</b></td><td>Line-of-sight, unidirectional</td><td>Cellular, satellite, Wi-Fi</td></tr>

  </div>
</div>

function buildNav(){
  const nav=document.getElementById('nav');

  SECTIONS.forEach(s=>{
    if(s.group!==lastGroup){

    }
    const a=document.createElement('div');a.className='navlink';a.dataset.id=s.id;

function show(id){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('show'));
  document.getElementById('sec-'+id).classList.add('show');
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  window.scrollTo({top:0,behavior:'smooth'});
  if(LAB_INIT[id]&&!LAB_INIT[id].done){LAB_INIT[id].fn();LAB_INIT[id].done=true;}
}

function buildSections(){
  const main=document.getElementById('main');
  // Build a lowercase lookup for auto-tagging keywords
  const glossLower={};
  Object.keys(GLOSS).forEach(k=>glossLower[k.toLowerCase()]=k);
  SECTIONS.forEach(s=>{
    const sec=document.createElement('section');
    sec.className='section'+(s.id==='home'?' show':'');
    sec.id='sec-'+s.id;
    sec.innerHTML=C[s.id]+(s.id!=='home'&&s.id!=='cheat'?'<footer>CPE 314 · Computer Networks · interactive exam prep · built from your course slides + past papers (2012, 2017)</footer>':'');

  });
